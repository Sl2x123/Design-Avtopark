<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Avtopakt Fura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=23"></script>
<link rel="stylesheet" href="assets/styles.css?v=23">
<script src="assets/panda.js?v=23"></script>
</head>
<body>
<div class="app">
  <div class="app-scroll px-6 flex flex-col">
    <div class="flex-1 flex flex-col justify-center py-10">
      <div class="flex flex-col items-center mb-10">
        <img src="assets/logo.svg" alt="Avtopakt Fura" class="w-20 h-20 rounded-3xl mb-4">
        <h1 class="text-2xl font-bold text-navy-800 tracking-tight">Avtopakt Fura</h1>
        <p class="text-gray-500 text-sm mt-1">Fleet management for logistics</p>
      </div>

      <h2 class="text-xl font-semibold text-navy-800 mb-1">Sign in</h2>
      <p class="text-gray-500 text-sm mb-6">Enter your phone number — we'll send you a verification code.</p>

      <label class="block text-sm font-medium text-gray-700 mb-1.5">Phone number</label>
      <div id="phoneWrap" class="flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-3.5 h-12 shadow-xs focus-within:border-primary-400 focus-within:ring-4 focus-within:ring-primary-100 transition">
        <span class="text-base">🇺🇿</span>
        <span class="text-navy-800 font-medium">+998</span>
        <span class="w-px h-5 bg-gray-200"></span>
        <input id="phoneIn" type="tel" inputmode="numeric" placeholder="90 123 45 67" class="flex-1 outline-none text-navy-800 font-medium placeholder:text-gray-400 bg-transparent">
      </div>
      <p id="phoneHint" class="text-gray-500 text-xs mt-2">Example: +998 90 123 45 67. Phone number only.</p>

      <button id="continueBtn" disabled class="btn mt-6 h-12 rounded-lg bg-primary-500 text-navy-800 font-bold flex items-center justify-center shadow-sm opacity-40 pointer-events-none">Continue</button>
    </div>
    <p class="text-center text-gray-400 text-xs pb-8 leading-relaxed">
      By continuing you agree to the <span class="text-gray-600 font-medium">Terms</span><br>and <span class="text-gray-600 font-medium">Privacy Policy</span>
    </p>
  </div>
</div>
<script>
  Panda.render();
  const phoneIn=document.getElementById('phoneIn'), btn=document.getElementById('continueBtn'), wrap=document.getElementById('phoneWrap'), hint=document.getElementById('phoneHint');
  function digitsOnly(v){ return v.replace(/\D/g,''); }
  phoneIn.addEventListener('input',()=>{
    const d=digitsOnly(phoneIn.value).slice(0,9);
    const valid=d.length===9;
    wrap.style.borderColor = phoneIn.value && !valid ? '#F04438' : '';
    hint.textContent = phoneIn.value && !valid ? 'Enter a full 9-digit number' : 'Example: +998 90 123 45 67. Phone number only.';
    hint.style.color = phoneIn.value && !valid ? '#F04438' : '';
    btn.disabled=!valid;
    btn.classList.toggle('opacity-40',!valid);
    btn.classList.toggle('pointer-events-none',!valid);
    btn.classList.toggle('hover:bg-primary-400',valid);
  });
  btn.addEventListener('click',()=>{
    if(btn.disabled) return;
    sessionStorage.setItem('af_phone','+998 '+phoneIn.value.trim());
    window.location.href='otp.html';
  });
</script>
</body>
</html>
