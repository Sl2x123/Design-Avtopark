<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage · Drivers — Avtopakt Fura</title>
<script>
  if(!localStorage.getItem('af_logged_in')){ location.replace('login.html'); }
  else { const s=JSON.parse(localStorage.getItem('af_subscription')||'null'); if(s&&new Date(s.expiresAt)<new Date()){ location.replace('subscription-expired.html'); } }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=23"></script>
<link rel="stylesheet" href="assets/styles.css?v=23">
<script src="assets/panda.js?v=23"></script>
</head>
<body>
<div class="app has-nav">
  <div class="sticky-head px-5 pt-5 border-b border-gray-100">
    <div class="relative flex items-center justify-between mb-3">
      <h1 class="text-2xl font-bold text-navy-800 tracking-tight">Garage</h1>
      <button id="searchBtn" class="w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-50"><i data-icon="search" class="w-5 h-5"></i></button>
      <div id="searchExpand" class="absolute inset-y-0 right-0 bg-white flex items-center" style="width:0;overflow:hidden;transition:width .3s cubic-bezier(.4,0,.2,1)">
        <div class="flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-3.5 h-10 w-full shadow-xs">
          <i data-icon="search" class="w-5 h-5 text-gray-400 shrink-0"></i>
          <input id="searchInput" class="flex-1 min-w-0 outline-none text-[15px] text-navy-800 placeholder:text-gray-400" placeholder="Search drivers">
          <button id="searchClose" class="text-gray-400 shrink-0"><i data-icon="x" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
    <div class="flex bg-gray-100 rounded-lg p-1 mb-3">
      <a href="garage-trucks.html" class="flex-1 text-center text-sm font-semibold py-2 rounded-md text-gray-500">Trucks</a>
      <a href="garage-drivers.html" class="flex-1 text-center text-sm font-semibold py-2 rounded-md bg-white text-navy-800 shadow-xs">Drivers</a>
      <a href="garage-trailers.html" class="flex-1 text-center text-sm font-semibold py-2 rounded-md text-gray-500">Trailers</a>
    </div>
    <div class="flex gap-2 pb-3 overflow-x-auto hide-scroll" data-tabs>
      <button class="seg-tab on">All 32</button>
      <button class="seg-tab">On trip 12</button>
      <button class="seg-tab">Idle 14</button>
      <button class="seg-tab">Resting 6</button>
    </div>
  </div>

  <div class="app-scroll bg-gray-50 px-4 pt-4 pb-28"><div class="space-y-3" id="list"></div></div>
  <a href="#" id="addBtn" class="fab-add"><i data-icon="user-plus"></i>Add driver</a>

  <!-- Add Driver modal -->
  <div id="sheet" class="sheet-overlay">
    <div class="sheet">
      <div class="sheet-head">
        <h2 class="text-lg font-bold text-navy-800">Add Driver</h2>
        <button data-close class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-50"><i data-icon="close" class="w-5 h-5"></i></button>
      </div>
      <div class="sheet-body space-y-4">
        <div>
          <label class="f-label">Phone number</label>
          <div class="flex gap-2">
            <div class="f-plate flex-1"><span class="seg">🇺🇿 +998</span><input id="add-driver-phone" inputmode="numeric" placeholder="90 123 45 67" onkeydown="if(event.key==='Enter')checkDriverPhone()"></div>
            <button onclick="checkDriverPhone()" class="btn h-12 px-4 rounded-lg bg-navy-800 text-white font-bold shrink-0">Check</button>
          </div>
        </div>

        <div id="driver-lookup-result" class="hidden"></div>

        <div id="driver-invite-fields" class="hidden space-y-4">
          <div><label class="f-label">Assign to truck (optional)</label><div class="f-sel"><select id="add-driver-truck" class="f-field"><option value="">— Not assigned —</option><option>DAF XF 105</option><option>Volvo FH16</option><option>MAN TGX</option><option>Scania R500</option></select><i data-icon="chevron-down" class="f-chev w-5 h-5"></i></div></div>
        </div>
      </div>
      <div class="sheet-foot">
        <button data-close class="btn flex-1 h-12 rounded-lg border border-gray-300 text-navy-800 font-bold hover:bg-gray-50">Cancel</button>
        <button id="add-driver-submit" onclick="submitAddDriver()" disabled class="btn flex-1 h-12 rounded-lg bg-primary-500 hover:bg-primary-400 text-navy-800 font-bold shadow-sm opacity-40 pointer-events-none">Send invitation</button>
      </div>
    </div>
  </div>
</div>

<script>
  const ST={trip:{label:'On trip',dot:'#17B26A',cls:'bg-success-50 text-success-700'},waiting:{label:'Idle',dot:'#2E90FA',cls:'bg-blue-50 text-blue-700'},rest:{label:'Resting',dot:'#0F0F37',cls:'bg-primary-100 text-navy-800'}};
  const drivers=[
    {name:'Alisher Karimov',   phone:'+998 90 727 77 22',truck:'Volvo FH16',      trips:128,st:'trip',   img:'d1'},
    {name:'Vali Rakhimov',     phone:'+998 90 555 12 34',truck:'DAF XF 105',      trips:96, st:'trip',   img:'d3'},
    {name:'Sardor Kholmatov',  phone:'+998 91 200 88 11',truck:'Mercedes Actros', trips:54, st:'waiting',img:'d4'},
    {name:'Jasur Ergashev',    phone:'+998 93 410 22 09',truck:'Renault T High',  trips:73, st:'rest',   img:'d5'},
    {name:'Bakhtiyor Yuldashev',phone:'+998 99 102 45 67',truck:'Scania R500',   trips:41, st:'rest',   img:'d2'},
  ];
  document.getElementById('list').innerHTML = drivers.map(d=>{
    const s=ST[d.st];
    return `
    <a href="driver-detail.html" class="card-press block rounded-2xl bg-white border border-gray-200 shadow-xs p-3.5">
      <div class="flex items-center gap-3">
        <img src="assets/img/drivers/${d.img}.jpg" class="w-14 h-14 rounded-full object-cover shrink-0">
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between gap-2">
            <h3 class="text-[15px] font-bold text-navy-800 truncate">${d.name}</h3>
            <span class="inline-flex items-center gap-1.5 ${s.cls} text-[11px] font-semibold px-2 py-1 rounded-full shrink-0"><span class="dot" style="background:${s.dot}"></span>${s.label}</span>
          </div>
          <div class="flex items-center gap-1.5 text-[13px] text-gray-500 mt-0.5"><i data-icon="phone" class="w-3.5 h-3.5"></i>${d.phone}</div>
        </div>
      </div>
      <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
        <div class="flex items-center gap-1.5 text-[13px] text-gray-600"><i data-icon="truck" class="w-4 h-4 text-gray-400"></i>${d.truck}</div>
        <div class="text-[13px] text-gray-600"><span class="font-bold text-navy-800">${d.trips}</span> trips</div>
      </div>
    </a>`;
  }).join('');
  const sx=document.getElementById('searchExpand');
  document.getElementById('searchBtn').addEventListener('click',()=>{const row=sx.parentElement,t=row.querySelector('h1');sx.style.width=(row.clientWidth-t.offsetWidth-12)+'px';setTimeout(()=>document.getElementById('searchInput').focus(),150);});
  document.getElementById('searchClose').addEventListener('click',()=>{sx.style.width='0';document.getElementById('searchInput').value='';});

  Panda.mountNav('garage');
  Panda.render();

  const ov=document.getElementById('sheet');
  document.getElementById('addBtn').addEventListener('click',e=>{e.preventDefault();resetAddDriverForm();ov.classList.add('open');});
  ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');});
  ov.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',()=>ov.classList.remove('open')));

  // Simulated registry of drivers searchable by phone
  const DRIVER_REGISTRY = [
    { phone:'998901112233', name:'Otabek Yusupov',      img:'d6', busy:false },
    { phone:'998993334455', name:'Farrukh Tashkentov',  img:'d7', busy:true, company:'Silk Road Cargo' },
  ];
  let _driverLookup = null;

  function normalizePhone(p){ return p.replace(/\D/g,''); }

  function resetAddDriverForm(){
    document.getElementById('add-driver-phone').value = '';
    const truckSel = document.getElementById('add-driver-truck');
    if (truckSel) truckSel.value = '';
    document.getElementById('driver-lookup-result').classList.add('hidden');
    document.getElementById('driver-lookup-result').innerHTML = '';
    document.getElementById('driver-invite-fields').classList.add('hidden');
    const submitBtn = document.getElementById('add-driver-submit');
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-40','pointer-events-none');
    _driverLookup = null;
  }

  function checkDriverPhone(){
    const phoneInput = document.getElementById('add-driver-phone');
    const raw = phoneInput.value.trim();
    const resultEl = document.getElementById('driver-lookup-result');
    const inviteEl = document.getElementById('driver-invite-fields');
    const submitBtn = document.getElementById('add-driver-submit');

    const digits = normalizePhone(raw);
    if (digits.length < 9) {
      phoneInput.style.borderColor = '#F04438';
      resultEl.classList.add('hidden');
      inviteEl.classList.add('hidden');
      return;
    }
    phoneInput.style.borderColor = '';

    const full = digits.length === 9 ? '998'+digits : digits;
    const known = DRIVER_REGISTRY.find(d => normalizePhone(d.phone).slice(-9) === full.slice(-9));
    _driverLookup = known || null;

    if (!known) {
      resultEl.innerHTML = `
        <div class="rounded-2xl p-4" style="background:#FFFAEB;border:1.5px solid #FEDF89">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style="background:#FEF0C7"><i data-icon="user-x" class="w-5 h-5" style="color:#B54708"></i></div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-bold text-navy-800">+${full}</p>
              <p class="text-xs text-gray-500">Водитель не найден в системе</p>
            </div>
          </div>
        </div>`;
      inviteEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-40','pointer-events-none');
      resultEl.classList.remove('hidden');
      Panda.render();
      return;
    }

    if (known.busy) {
      resultEl.innerHTML = `
        <div class="rounded-2xl p-4" style="background:#FEF3F2;border:1.5px solid #FECDCA">
          <div class="flex items-center gap-3 mb-2">
            <img src="assets/img/drivers/${known.img}.jpg" class="w-11 h-11 rounded-full object-cover shrink-0">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-bold text-navy-800">${known.name}</p>
              <p class="text-xs text-gray-500">+${full}</p>
            </div>
            <span class="text-xs font-bold px-2.5 py-1 rounded-full shrink-0" style="background:#FEE4E2;color:#B42318">Занят</span>
          </div>
          <p class="text-xs" style="color:#B42318">Работает в: <strong>${known.company}</strong></p>
        </div>`;
      inviteEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-40','pointer-events-none');
    } else {
      resultEl.innerHTML = `
        <div class="rounded-2xl p-4" style="background:#ECFDF3;border:1.5px solid #ABEFC6">
          <div class="flex items-center gap-3">
            <img src="assets/img/drivers/${known.img}.jpg" class="w-11 h-11 rounded-full object-cover shrink-0">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-bold text-navy-800">${known.name}</p>
              <p class="text-xs text-gray-400">+${full}</p>
            </div>
            <span class="text-xs font-bold px-2.5 py-1 rounded-full shrink-0" style="background:#D1FADF;color:#079455">Свободен</span>
          </div>
        </div>`;
      inviteEl.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.classList.remove('opacity-40','pointer-events-none');
    }
    resultEl.classList.remove('hidden');
    Panda.render();
  }

  function submitAddDriver(){
    if (!_driverLookup || _driverLookup.busy) return;
    ov.classList.remove('open');
    resetAddDriverForm();
  }
</script>
</body>
</html>
