<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — Avtopakt Fura</title>
<script>
  if(!localStorage.getItem('af_logged_in')){ location.replace('login.html'); }
  else { const s=JSON.parse(localStorage.getItem('af_subscription')||'null'); if(s&&new Date(s.expiresAt)<new Date()){ location.replace('subscription-expired.html'); } }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=23"></script>
<link rel="stylesheet" href="assets/styles.css?v=23">
<script src="assets/panda.js?v=23"></script>
</head>
<body>
<div class="app has-nav">
  <div class="sticky-head px-5 pt-5 pb-3 border-b border-gray-100">
    <h1 class="text-2xl font-bold text-navy-800 tracking-tight mb-3">Analytics</h1>
    <div class="flex items-center gap-2">
      <div class="flex gap-2 overflow-x-auto hide-scroll flex-1" data-tabs id="period-tabs">
        <button class="seg-tab" onclick="setPeriod('today',this)">Today</button>
        <button class="seg-tab on" onclick="setPeriod('7d',this)">7 days</button>
        <button class="seg-tab" onclick="setPeriod('month',this)">This month</button>
        <button class="seg-tab" onclick="setPeriod('last',this)">Last month</button>
      </div>
      <button id="cal-btn" onclick="openCalSheet()" class="shrink-0 w-9 h-9 rounded-xl border border-gray-200 bg-white flex items-center justify-center text-gray-500 hover:bg-gray-50 transition-colors">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      </button>
    </div>
  </div>

  <!-- Calendar sheet overlay -->
  <div id="calOverlay" onclick="if(event.target===this)closeCalSheet()" style="display:none;position:fixed;inset:0;background:rgba(15,15,55,.35);z-index:100;align-items:flex-end">
    <div id="calSheet" style="background:#fff;border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.5,1)">
      <!-- Handle -->
      <div style="display:flex;justify-content:center;padding:12px 0 4px"><div style="width:36px;height:4px;border-radius:999px;background:#E4E7EC"></div></div>
      <!-- Header -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 18px 14px">
        <span style="font-size:17px;font-weight:800;color:#0F0F37">Выбрать период</span>
        <button onclick="closeCalSheet()" style="width:32px;height:32px;border-radius:10px;background:#F4F5F7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#667085">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- Quick presets -->
      <div style="padding:0 16px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px" id="presets"></div>

      <!-- Divider -->
      <div style="height:1px;background:#F2F4F7;margin:0 16px 16px"></div>

      <!-- Calendar nav -->
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0 16px 12px">
        <button onclick="calNav(-1)" style="width:32px;height:32px;border-radius:10px;border:1px solid #E4E7EC;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#667085">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span id="calMonthLabel" style="font-size:14px;font-weight:700;color:#0F0F37"></span>
        <button onclick="calNav(1)" style="width:32px;height:32px;border-radius:10px;border:1px solid #E4E7EC;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#667085">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

      <!-- Day-of-week headers -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);padding:0 16px;margin-bottom:6px">
        <div style="text-align:center;font-size:11px;font-weight:600;color:#98A2B3">Mo</div>
        <div style="text-align:center;font-size:11px;font-weight:600;color:#98A2B3">Tu</div>
        <div style="text-align:center;font-size:11px;font-weight:600;color:#98A2B3">We</div>
        <div style="text-align:center;font-size:11px;font-weight:600;color:#98A2B3">Th</div>
        <div style="text-align:center;font-size:11px;font-weight:600;color:#98A2B3">Fr</div>
        <div style="text-align:center;font-size:11px;font-weight:600;color:#98A2B3">Sa</div>
        <div style="text-align:center;font-size:11px;font-weight:600;color:#98A2B3">Su</div>
      </div>

      <!-- Calendar grid -->
      <div id="calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);padding:0 16px;gap:2px 0"></div>

      <!-- Selected range label -->
      <div id="rangeLabel" style="text-align:center;font-size:12px;color:#667085;padding:10px 16px 4px;min-height:32px"></div>

      <!-- Apply -->
      <div style="padding:8px 16px 20px">
        <button onclick="applyCalRange()" style="width:100%;height:48px;border-radius:14px;background:#FFCB00;border:none;font-size:15px;font-weight:800;color:#0F0F37;cursor:pointer;font-family:inherit">Применить</button>
      </div>
    </div>
  </div>

  <div class="app-scroll bg-gray-50 px-4 py-4 space-y-4">
    <!-- Revenue / Expenses / Profit -->
    <div class="grid grid-cols-3 gap-2.5" id="fin"></div>

    <!-- Trips / Mileage / Fuel -->
    <div class="grid grid-cols-3 gap-2.5" id="counts"></div>

    <!-- Fleet status -->
    <div class="rounded-2xl bg-white border border-gray-200 p-4 shadow-xs">
      <h3 class="text-sm font-semibold text-navy-800 mb-3">Fleet status</h3>
      <div class="grid grid-cols-5 gap-1.5 text-center" id="fleetstat"></div>
    </div>

    <!-- Profit ranking -->
    <div class="rounded-2xl bg-white border border-gray-200 shadow-xs p-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-navy-800">Profit ranking</h3>
        <div class="f-sel"><select class="f-field !h-9 !text-[13px] !pr-9 !w-auto"><option>By profit</option><option>By revenue</option><option>By trips</option></select><i data-icon="chevron-down" class="f-chev w-4 h-4"></i></div>
      </div>
      <div class="space-y-2" id="rank"></div>
    </div>

    <!-- Expense breakdown -->
    <div class="rounded-2xl bg-white border border-gray-200 shadow-xs p-4">
      <h3 class="text-sm font-semibold text-navy-800 mb-4">Expense breakdown</h3>
      <div class="flex items-center gap-4">
        <div class="relative shrink-0" style="width:118px;height:118px">
          <div id="pie" style="width:118px;height:118px;border-radius:50%"></div>
          <div class="absolute bg-white rounded-full flex flex-col items-center justify-center shadow-xs" style="inset:25px">
            <p class="text-[9px] text-gray-400">Total</p>
            <p id="pieTotal" class="text-[13px] font-bold text-navy-800"></p>
          </div>
        </div>
        <div class="flex-1 space-y-2" id="pieLegend"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const money=n=>'$'+Number(n).toLocaleString('en-US');

  // Revenue / Expenses / Profit — [label, value, textColor, cardClasses]
  const fin=[
    ['Revenue', money(120000), 'text-success-700', 'bg-gray-50 border-gray-100'],
    ['Expenses', money(82000), 'text-error-600', 'bg-gray-50 border-gray-100'],
    ['Profit', money(38000), 'text-navy-800', 'bg-primary-50 border-primary-200'],
  ];
  document.getElementById('fin').innerHTML = fin.map(([l,v,fg,bg])=>`
    <div class="rounded-2xl border ${bg} p-3">
      <p class="text-[12px] text-gray-400">${l}</p>
      <p class="text-[17px] font-bold ${fg} mt-1 leading-tight whitespace-nowrap">${v}</p>
    </div>`).join('');

  // Trips / Mileage / Fuel — one row
  const counts=[
    ['Trips','87','route','bg-primary-100','text-navy-700'],
    ['Mileage','152,000 km','gauge','bg-blue-50','text-blue-600'],
    ['Fuel','42,500 L','fuel','bg-gray-100','text-gray-600'],
  ];
  document.getElementById('counts').innerHTML = counts.map(([l,v,ic,bg,fg])=>`
    <div class="rounded-2xl bg-white border border-gray-200 p-3 shadow-xs">
      <span class="w-7 h-7 rounded-full ${bg} ${fg} flex items-center justify-center mb-1.5"><i data-icon="${ic}" class="w-3.5 h-3.5"></i></span>
      <p class="text-[12px] text-gray-500">${l}</p>
      <p class="text-[15px] font-bold text-navy-800 leading-tight">${v}</p>
    </div>`).join('');

  // Expense breakdown pie
  const exp=[
    ['Fuel',34440,'#F79009'],
    ['Salary',19680,'#2E90FA'],
    ['Service',11480,'#7A5AF8'],
    ['Insurance',6560,'#17B26A'],
    ['Fines',4100,'#F04438'],
    ['Other',5740,'#98A2B3'],
  ];
  const expTotal=exp.reduce((s,e)=>s+e[1],0);
  let acc=0;
  const stops=exp.map(e=>{const a=acc/expTotal*100;acc+=e[1];const b=acc/expTotal*100;return `${e[2]} ${a}% ${b}%`;}).join(',');
  document.getElementById('pie').style.background=`conic-gradient(${stops})`;
  document.getElementById('pieTotal').textContent=money(expTotal);
  document.getElementById('pieLegend').innerHTML=exp.map(e=>{const pct=Math.round(e[1]/expTotal*100);return `
    <div class="flex items-center gap-2">
      <span class="shrink-0" style="width:10px;height:10px;border-radius:3px;background:${e[2]}"></span>
      <span class="text-[12px] text-gray-600 flex-1">${e[0]}</span>
      <span class="text-[12px] font-bold text-navy-800">${pct}%</span>
      <span class="text-[11px] text-gray-400 w-14 text-right">${money(e[1])}</span>
    </div>`;}).join('');

  const fs=[['On trip','12','#17B26A'],['Idle','8','#2E90FA'],['Repair','3','#F79009'],['No signal','2','#667085'],['Resting','6','#0F0F37']];
  document.getElementById('fleetstat').innerHTML = fs.map(([l,v,c])=>`
    <div class="rounded-xl bg-gray-50 py-2.5"><p class="text-lg font-bold" style="color:${c}">${v}</p><p class="text-[10px] text-gray-500 leading-tight mt-0.5">${l}</p></div>`).join('');

  // ranking
  const rank=[
    ['DAF XF 105','60 A 467 AA',18500,11200,7300,100],
    ['MAN TGX','10 B 123 BB',16800,10000,6800,93],
    ['Volvo FH','01 C 234 CC',15400,9500,5900,81],
    ['Scania R','77 D 345 DD',14900,9800,5100,70],
    ['Mercedes Actros','20 E 456 EE',13200,9200,4000,55],
    ['Iveco Stralis','90 F 567 FF',12100,8600,3500,48],
    ['Renault T','45 G 678 GG',11000,7800,3200,44],
    ['MAN TGS','33 H 789 HH',10200,7600,2600,36],
  ];
  function tier(pct){
    if(pct>=70) return {bg:'bg-success-50',badge:'bg-success-500',pc:'text-success-600'};
    if(pct>=50) return {bg:'bg-warning-50',badge:'bg-warning-500',pc:'text-warning-600'};
    return {bg:'bg-error-50',badge:'bg-error-500',pc:'text-error-600'};
  }
  document.getElementById('rank').innerHTML = rank.map((r,i)=>{
    const t=tier(r[5]);
    return `<a href="truck-detail.html" class="flex items-center gap-2.5 rounded-2xl p-2.5 card-press" style="background:linear-gradient(to right,#ABEFC6 ${r[5]}%,#E4E7EC ${r[5]}%)">
      <span class="w-7 h-7 rounded-lg ${t.badge} text-white font-bold flex items-center justify-center text-sm shrink-0">${i+1}</span>
      <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between gap-2">
          <p class="text-sm font-bold text-navy-800 truncate">${r[0]}</p>
          <span class="text-sm font-bold ${t.pc} shrink-0">${r[5]}%</span>
        </div>
        <p class="text-[11px] text-gray-400">${r[1]}</p>
        <div class="flex gap-3 mt-1 text-[11px]">
          <span class="text-gray-400">Rev <b class="text-blue-600">${money(r[2])}</b></span>
          <span class="text-gray-400">Exp <b class="text-error-600">${money(r[3])}</b></span>
          <span class="text-gray-400">Profit <b class="text-success-700">${money(r[4])}</b></span>
        </div>
      </div>
      <span class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-500 shrink-0"><i data-icon="chevron-right" class="w-4 h-4"></i></span>
    </a>`;
  }).join('');

  Panda.mountNav('analytics');
  Panda.render();

  // ── Period tabs ──────────────────────────────────────────────
  function setPeriod(key, btn) {
    document.querySelectorAll('#period-tabs .seg-tab').forEach(b=>b.classList.remove('on'));
    if(btn) btn.classList.add('on');
    // update cal-btn highlight
    document.getElementById('cal-btn').style.borderColor = '';
    document.getElementById('cal-btn').style.background = '';
    document.getElementById('cal-btn').style.color = '';
  }

  // ── Calendar sheet ───────────────────────────────────────────
  var calYear, calMonth, rangeStart=null, rangeEnd=null;

  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const PRESETS=[
    {label:'Сегодня',     key:'today'},
    {label:'7 дней',      key:'7d'},
    {label:'30 дней',     key:'30d'},
    {label:'Этот месяц',  key:'month'},
    {label:'Прошлый мес.',key:'last'},
    {label:'Этот год',    key:'year'},
  ];

  function openCalSheet(){
    var now=new Date();
    calYear=now.getFullYear(); calMonth=now.getMonth();
    rangeStart=null; rangeEnd=null;
    renderPresets(); renderCal(); updateRangeLabel();
    var overlay=document.getElementById('calOverlay');
    overlay.style.display='flex';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        document.getElementById('calSheet').style.transform='translateY(0)';
      });
    });
  }
  function closeCalSheet(){
    document.getElementById('calSheet').style.transform='translateY(100%)';
    setTimeout(function(){ document.getElementById('calOverlay').style.display='none'; },300);
  }

  function renderPresets(){
    document.getElementById('presets').innerHTML=PRESETS.map(function(p){
      return '<button onclick="applyPreset(\''+p.key+'\')" style="height:38px;border-radius:12px;border:1.5px solid #E4E7EC;background:#F9FAFB;font-size:13px;font-weight:600;color:#344054;cursor:pointer;font-family:inherit;transition:all .15s">'+p.label+'</button>';
    }).join('');
  }

  function applyPreset(key){
    var now=new Date(); var y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
    if(key==='today'){ rangeStart=new Date(y,m,d); rangeEnd=new Date(y,m,d); }
    else if(key==='7d'){ rangeEnd=new Date(y,m,d); rangeStart=new Date(y,m,d-6); }
    else if(key==='30d'){ rangeEnd=new Date(y,m,d); rangeStart=new Date(y,m,d-29); }
    else if(key==='month'){ rangeStart=new Date(y,m,1); rangeEnd=new Date(y,m+1,0); }
    else if(key==='last'){ rangeStart=new Date(y,m-1,1); rangeEnd=new Date(y,m,0); }
    else if(key==='year'){ rangeStart=new Date(y,0,1); rangeEnd=new Date(y,11,31); }
    calYear=rangeStart.getFullYear(); calMonth=rangeStart.getMonth();
    renderCal(); updateRangeLabel();
  }

  function calNav(dir){
    calMonth+=dir;
    if(calMonth>11){calMonth=0;calYear++;}
    if(calMonth<0){calMonth=11;calYear--;}
    renderCal();
  }

  function renderCal(){
    document.getElementById('calMonthLabel').textContent=MONTHS[calMonth]+' '+calYear;
    var first=new Date(calYear,calMonth,1);
    var startDow=(first.getDay()+6)%7; // Mon=0
    var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    var cells='';
    for(var i=0;i<startDow;i++) cells+='<div></div>';
    for(var day=1;day<=daysInMonth;day++){
      var dt=new Date(calYear,calMonth,day);
      var isStart=rangeStart&&sameDay(dt,rangeStart);
      var isEnd=rangeEnd&&sameDay(dt,rangeEnd);
      var inRange=rangeStart&&rangeEnd&&dt>=rangeStart&&dt<=rangeEnd;
      var isToday=sameDay(dt,new Date());
      var bg='transparent', color='#0F0F37', fw='500', br='10px', extraBg='';
      if(isStart||isEnd){ bg='#FFCB00'; color='#0F0F37'; fw='800'; }
      else if(inRange){ bg='#FEF3C7'; }
      if(isToday&&!isStart&&!isEnd){ color='#D97706'; fw='700'; }
      cells+='<div onclick="pickDay('+calYear+','+calMonth+','+day+')" style="display:flex;align-items:center;justify-content:center;height:36px;cursor:pointer;background:'+bg+';border-radius:'+br+';font-size:13px;font-weight:'+fw+';color:'+color+'">' +day+'</div>';
    }
    document.getElementById('calGrid').innerHTML=cells;
  }

  function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

  function pickDay(y,m,d){
    var dt=new Date(y,m,d);
    if(!rangeStart||rangeEnd){
      rangeStart=dt; rangeEnd=null;
    } else {
      if(dt<rangeStart){ rangeEnd=rangeStart; rangeStart=dt; }
      else { rangeEnd=dt; }
    }
    renderCal(); updateRangeLabel();
  }

  function updateRangeLabel(){
    var el=document.getElementById('rangeLabel');
    if(!rangeStart){ el.textContent=''; return; }
    var fmt=function(d){ return d.getDate()+'.'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'.'+d.getFullYear(); };
    el.textContent = rangeEnd&&!sameDay(rangeStart,rangeEnd)
      ? fmt(rangeStart)+' — '+fmt(rangeEnd)
      : fmt(rangeStart);
  }

  function applyCalRange(){
    if(!rangeStart) return closeCalSheet();
    // highlight calendar button to show custom range is active
    var btn=document.getElementById('cal-btn');
    btn.style.borderColor='#FFCB00'; btn.style.background='#FFFBEB'; btn.style.color='#D97706';
    // deselect all period tabs
    document.querySelectorAll('#period-tabs .seg-tab').forEach(b=>b.classList.remove('on'));
    closeCalSheet();
  }
</script>
</body>
</html>
