<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="assets/panda.js?v=29"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F4F5F7;color:#0F0F37;-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.top-bar{position:sticky;top:0;z-index:50;background:rgba(244,245,247,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:16px 16px 12px;border-bottom:1px solid rgba(0,0,0,.06)}
.top-bar-inner{display:flex;align-items:center;gap:12px}
.back-btn{width:36px;height:36px;border-radius:10px;background:white;border:1px solid #EAECF0;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;color:#344054;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.top-title{flex:1;min-width:0}
.top-title h1{font-size:17px;font-weight:800;color:#0F0F37;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Scroll body */
.body-scroll{flex:1;overflow-y:auto;padding:16px 16px 32px}

/* Section label */
.sec-label{font-size:11px;font-weight:700;color:#98A2B3;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;margin-top:20px}
.sec-label:first-child{margin-top:0}

/* Route hero card */
.route-card{background:white;border-radius:20px;padding:18px 16px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #EAECF0;margin-bottom:6px}
.route-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.route-city{flex:1;min-width:0}
.route-city .city-name{font-size:20px;font-weight:900;color:#0F0F37;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.route-city .city-sub{font-size:11px;color:#98A2B3;margin-top:2px}
.route-arrow{width:36px;height:36px;border-radius:50%;background:#FFFBEB;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prog-wrap{margin-bottom:10px}
.prog-track{height:6px;background:#F2F4F7;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#FFCB00,#FFB800);border-radius:999px;transition:width .6s ease}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:#98A2B3;margin-top:5px}
.info-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;background:#F4F5F7;color:#344054}
.chip.green{background:#ECFDF3;color:#027A48}
.chip.yellow{background:#FFFBEB;color:#B45309}

/* Entity cards */
.entity-card{background:white;border-radius:18px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid #EAECF0;overflow:hidden;margin-bottom:10px}
.entity-inner{display:flex;align-items:center;gap:14px;padding:14px 14px}
.entity-img{width:56px;height:56px;border-radius:14px;object-fit:cover;flex-shrink:0}
.entity-icon{width:56px;height:56px;border-radius:14px;background:#F4F5F7;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.entity-info{flex:1;min-width:0}
.entity-name{font-size:15px;font-weight:700;color:#0F0F37;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entity-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.meta-tag{font-size:10px;font-weight:600;color:#667085;background:#F4F5F7;padding:2px 7px;border-radius:6px}
.entity-action{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;border:none;cursor:pointer}
.entity-divider{height:1px;background:#F4F5F7;margin:0 14px}
.entity-row{display:flex;align-items:center;gap:10px;padding:10px 14px}
.entity-row-label{font-size:11px;color:#98A2B3;font-weight:500}
.entity-row-val{font-size:12px;font-weight:600;color:#344054;margin-left:auto}

/* Map card */
.map-card{background:white;border-radius:20px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.07);border:1px solid #EAECF0;margin-bottom:6px}
.map-stats{display:flex}
.map-stat{flex:1;padding:11px 13px;border-right:1px solid #F0F0F0}
.map-stat:last-child{border-right:none}
.map-stat-label{font-size:9px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.map-stat-val{font-size:14px;font-weight:800;color:#0F0F37}

/* Expenses quick */
.exp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.exp-cat-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;border-radius:14px;border:none;cursor:pointer;transition:transform .1s,opacity .15s;-webkit-tap-highlight-color:transparent}
.exp-cat-btn:active{transform:scale(.94);opacity:.8}
.exp-cat-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.exp-cat-label{font-size:9px;font-weight:700;text-align:center;line-height:1.3}

/* Expense list */
.exp-list-card{background:white;border-radius:18px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid #EAECF0;overflow:hidden}
.exp-list-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid #F4F5F7}
.exp-list-head-title{font-size:14px;font-weight:700;color:#0F0F37}
.exp-total{font-size:13px;font-weight:700;color:#F04438}
.exp-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #F9FAFB}
.exp-item:last-child{border-bottom:none}
.exp-item-cat{font-size:13px;font-weight:600;color:#0F0F37}
.exp-item-note{font-size:11px;color:#98A2B3;margin-top:1px}
.exp-item-amount{font-size:14px;font-weight:800;color:#F04438}
.exp-empty{padding:24px 14px;text-align:center;color:#D0D5DD;font-size:13px}
</style>
</head>
<body>
<div class="app">

  <div class="top-bar">
    <div class="top-bar-inner">

    <line x1="272" y1="92" x2="228" y2="110" stroke="#0F0F37" stroke-width="2" stroke-dasharray="4,5" opacity=".25" stroke-linecap="round"/>
    <circle cx="300" cy="78" r="5.5" fill="#475467" stroke="white" stroke-width="1.5"/>

    <circle cx="228" cy="110" r="5.5" fill="#FFCB00" stroke="#0F0F37" stroke-width="1.5"/>

// Quick expense grid
const expGrid = `
<div class="exp-grid">
  ${EXP_CATS.map(c => `
  <button class="exp-cat-btn" onclick="addExp('${c.label}')" style="background:${c.bg}">
    <div class="exp-cat-icon" style="background:white;box-shadow:0 1px 4px rgba(0,0,0,.08)">
      <svg viewBox="0 0 24 24" fill="none" stroke="${c.color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">${c.icon}</svg>
    </div>
    <span class="exp-cat-label" style="color:${c.color}">${c.label}</span>
  </button>`).join('')}
</div>`;

// Expense list render
function renderExpList() {
  const total = o.expenses.reduce((s,e)=>s+e.amount, 0);
  return `
  <div class="exp-list-card">
    <div class="exp-list-head">
      <span class="exp-list-head-title">История расходов</span>
      <span class="exp-total">${total > 0 ? '−$' + total.toLocaleString() : '$0'}</span>
    </div>
    ${o.expenses.length ? o.expenses.map(e => `
    <div class="exp-item">
      <div>
        <div class="exp-item-cat">${e.cat}</div>
        ${e.note ? `<div class="exp-item-note">${e.note}</div>` : ''}
      </div>
      <div class="exp-item-amount">−$${e.amount.toLocaleString()}</div>
    </div>`).join('') : `<div class="exp-empty">Расходов пока нет</div>`}
  </div>`;
}

function addExp(cat) {
  const amt = prompt(`Сумма (${cat}), $:`);
  if (!amt || isNaN(parseFloat(amt))) return;
  const note = prompt('Комментарий:') || '';
  o.expenses.push({cat, amount: parseFloat(amt), note});
  document.getElementById('exp-list-wrap').innerHTML = renderExpList();
}

document.getElementById('body-scroll').innerHTML = `
  ${routeHero}

  <div class="sec-label" style="margin-top:18px">Транспорт и экипаж</div>
  ${truckCard}
  ${driverCard}
  ${o.trailer ? trailerCard : ''}

  ${o.status === 'active' ? `<div class="sec-label">Live карта</div>${miniMap}` : ''}

  <div class="sec-label">Добавить расход</div>
  ${expGrid}

  <div class="sec-label">Расходы</div>
  <div id="exp-list-wrap">${renderExpList()}</div>
`;
</script>
</body>
