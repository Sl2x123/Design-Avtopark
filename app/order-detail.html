<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F2F4F7;color:#0F0F37;-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100vh}

/* TOP BAR */
.top-bar{position:sticky;top:0;z-index:50;padding:14px 16px;display:flex;align-items:center;gap:10px;background:rgba(242,244,247,.9);backdrop-filter:blur(14px)}
.back-btn{width:36px;height:36px;border-radius:11px;background:white;border:1px solid #E4E7EC;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;color:#344054;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.top-id{font-size:13px;font-weight:700;color:#344054;flex:1}
.s-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* BODY SCROLL */
.scroll{overflow-y:auto;padding:14px 16px 40px;display:flex;flex-direction:column;gap:10px}

/* HERO */
.hero{position:relative;height:220px;border-radius:18px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.14);cursor:pointer;display:block;text-decoration:none}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05) 30%,rgba(0,0,0,.7) 100%)}
.hero-goto{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 10px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:white}
.hero-info{position:absolute;bottom:0;left:0;right:0;padding:14px 16px}
.hero-name{font-size:21px;font-weight:900;color:white;letter-spacing:-.3px;line-height:1.1}
.hero-plate{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);border-radius:7px;padding:3px 8px;margin-top:6px}
.hero-plate span{font-size:11px;font-weight:700;color:white;letter-spacing:.5px}
.hero-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.hero-tag{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;color:rgba(255,255,255,.9)}

/* CREW ROW */
.crew-row{display:flex;gap:10px}
.crew-card{flex:1;background:white;border-radius:18px;border:1px solid #EAECF0;box-shadow:0 1px 4px rgba(0,0,0,.05);padding:14px;text-decoration:none;color:inherit;display:flex;flex-direction:column;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden}
.crew-card:active{opacity:.85}
.crew-goto{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:8px;background:#F4F5F7;display:flex;align-items:center;justify-content:center}
.crew-lbl{font-size:9px;font-weight:700;color:#98A2B3;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.crew-av{width:48px;height:48px;border-radius:50%;object-fit:cover;border:2.5px solid #FFCB00;margin-bottom:8px}
.crew-icon{width:48px;height:48px;border-radius:14px;background:#F4F5F7;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.crew-name{font-size:13px;font-weight:700;color:#0F0F37;line-height:1.3;padding-right:20px}
.crew-meta{font-size:10px;color:#667085;margin-top:4px;line-height:1.5}
.crew-meta b{color:#344054;font-weight:600}
.crew-call{display:flex;align-items:center;justify-content:center;gap:5px;background:#ECFDF3;border-radius:10px;padding:7px 8px;font-size:11px;font-weight:700;color:#17B26A;margin-top:10px;text-decoration:none;border:none;cursor:pointer;width:100%}

/* ROUTE CARD */
.card{background:white;border-radius:18px;border:1px solid #EAECF0;box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden}
.card-body{padding:14px 16px}
.route-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.city{flex:1;min-width:0}
.city-name{font-size:19px;font-weight:900;color:#0F0F37;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.city-date{font-size:11px;color:#98A2B3;margin-top:2px}
.arr-circle{width:32px;height:32px;border-radius:50%;background:#FFFBEB;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prog-track{height:5px;background:#F2F4F7;border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#FFCB00,#FFA800);border-radius:999px}
.prog-lbls{display:flex;justify-content:space-between;font-size:10px;color:#98A2B3;margin-top:4px}
.chips-row{display:flex;gap:6px;flex-wrap:wrap;padding:10px 16px;border-top:1px solid #F4F5F7}
.chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px}

/* MAP */
.map-stats{display:flex;border-top:1px solid #F0F0F0}
.ms{flex:1;padding:11px 14px;border-right:1px solid #F0F0F0}
.ms:last-child{border-right:none}
.ms-l{font-size:9px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.ms-v{font-size:14px;font-weight:800;color:#0F0F37}

/* SECTION HEADER */
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 6px}
.sec-title{font-size:13px;font-weight:700;color:#344054}
.sec-btn{font-size:12px;font-weight:600;color:#667085;background:none;border:none;cursor:pointer;padding:2px 0;font-family:inherit}
.add-btn{display:flex;align-items:center;gap:5px;background:#FFCB00;border:none;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;color:#0F0F37;cursor:pointer;font-family:inherit}

/* QUICK ADD */
.quick-scroll{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:2px 0 6px}
.quick-scroll::-webkit-scrollbar{display:none}
.q-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;transition:transform .1s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.q-btn:active{transform:scale(.94)}
.q-btn span{font-size:12px;font-weight:700}

/* EXPENSES */
.exp-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid #F9FAFB}
.exp-item:last-child{border-bottom:none}
.exp-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.exp-body{flex:1;min-width:0}
.exp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.exp-cat{font-size:13px;font-weight:700;color:#0F0F37}
.exp-amt{font-size:14px;font-weight:800;color:#F04438;white-space:nowrap}
.exp-note{font-size:11px;color:#667085;margin-top:2px}
.exp-who{display:flex;align-items:center;gap:5px;margin-top:6px}
.exp-av{width:18px;height:18px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid #EAECF0}
.exp-who-txt{font-size:10px;color:#98A2B3}
.exp-del{margin-left:auto;background:none;border:none;cursor:pointer;color:#D0D5DD;font-size:18px;line-height:1;padding:0 2px}
.exp-del:hover{color:#F04438}
.exp-empty{padding:20px 16px;text-align:center;color:#D0D5DD;font-size:13px}
.exp-summary-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #F4F5F7}
.exp-summary-row span:first-child{font-size:13px;font-weight:700;color:#0F0F37}
.exp-total{font-size:15px;font-weight:800;color:#F04438}
.see-all-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:11px 16px;font-size:12px;font-weight:600;color:#667085;background:none;border:none;border-top:1px solid #F4F5F7;cursor:pointer;width:100%;font-family:inherit}

/* LOG */
.log-item{display:flex;gap:12px;padding:11px 16px;border-bottom:1px solid #F9FAFB;position:relative}
.log-item:last-child{border-bottom:none}
.log-dot-col{display:flex;flex-direction:column;align-items:center;padding-top:2px;gap:0}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.log-line{width:1.5px;background:#F0F0F0;flex:1;margin-top:3px;min-height:8px}
.log-text{font-size:12px;color:#344054;font-weight:500;line-height:1.4}
.log-text strong{font-weight:700;color:#0F0F37}
.log-time{font-size:10px;color:#98A2B3;margin-top:2px}
.log-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;margin-left:4px;vertical-align:middle}
</style>
</head>

const idx = parseInt(new URLSearchParams(location.search).get('idx') || '0');
const o = ORDERS[Math.min(idx, ORDERS.length - 1)];
const s = STATUS[o.status];
let showAllExp = false;

document.getElementById('hd-id').textContent = o.id;
const sp = document.getElementById('hd-status');
sp.style.cssText = `background:${s.bg};color:${s.color};display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px`;
sp.innerHTML = `<span class="s-dot" style="background:${s.dot}"></span>${s.label}`;
document.title = o.from + ' → ' + o.to;

function addExpense(cat) {
  const c = EXP_CATS.find(x => x.l === cat);
  const amt = prompt(`Сумма (${cat}), $:`);
  if (!amt || isNaN(parseFloat(amt))) return;
  const note = prompt('Комментарий:') || '';
  const now = new Date();
  const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][now.getMonth()];
  const t = now.getDate() + ' ' + mo + ' · ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  o.expenses.unshift({cat, amount: parseFloat(amt), note, by: o.driver.name, byImg: o.driver.img, at: t, color: c.c, bg: c.bg});
  o.logs.unshift({text:`<strong>${o.driver.name}</strong> добавил ${cat}`, badge:`−$${parseFloat(amt).toLocaleString()}`, badgeRed:true, time:t, dot:'#F79009'});
  render();
}

function deleteExpense(i) {
  const e = o.expenses[i];
  const now = new Date();
  const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][now.getMonth()];
  const t = now.getDate() + ' ' + mo + ' · ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  o.logs.unshift({text:`<strong>${o.driver.name}</strong> удалил ${e.cat}`, badge:`+$${e.amount.toLocaleString()}`, badgeRed:false, time:t, dot:'#F04438'});
  o.expenses.splice(i, 1);
  render();
}

function toggleAllExp() {
  showAllExp = !showAllExp;
  render();
}

function render() {
  const total = o.expenses.reduce((s,e) => s+e.amount, 0);
  const PREVIEW = 3;
  const visible = showAllExp ? o.expenses : o.expenses.slice(0, PREVIEW);

  document.getElementById('body').innerHTML = `

    <!-- HERO: Truck -->
    <a href="${o.truck.link}" class="hero">
      <img src="${o.truck.img}" onerror="this.src='assets/img/trucks/truck1.jpg'">
      <div class="hero-grad"></div>
      <div class="hero-goto">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" width="12" height="12"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Открыть
      </div>
      <div class="hero-info">
        <div class="hero-name">${o.truck.name}</div>
        <div class="hero-plate">
          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2" width="10" height="10"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 11h18"/></svg>
          <span>${o.truck.plate}</span>
        </div>
        <div class="hero-tags">
          <span class="hero-tag">${o.truck.year}</span>
          <span class="hero-tag">${o.truck.power}</span>
          <span class="hero-tag">${o.truck.fuel}</span>
        </div>
      </div>
    </a>

    <!-- CREW: Driver + Trailer -->
    <div class="crew-row">
      <a href="${o.driver.link}" class="crew-card">
        <div class="crew-goto">
          <svg viewBox="0 0 24 24" fill="none" stroke="#98A2B3" stroke-width="2.5" width="12" height="12"><path d="m9 18 6-6-6-6"/></svg>
        </div>
        <div class="crew-lbl">Водитель</div>
        <img src="${o.driver.img}" class="crew-av" onerror="this.src='assets/img/drivers/d1.jpg'">
        <div class="crew-name">${o.driver.name}</div>
        <div class="crew-meta">
          <span style="color:#FFCB00;font-weight:700">★</span> ${o.driver.rating}
          &nbsp;·&nbsp; ${o.driver.exp}
        </div>
        <div class="crew-meta">${o.driver.trips} рейсов</div>
        <button class="crew-call" onclick="event.preventDefault();event.stopPropagation();window.location.href='tel:${o.driver.phone}'">
          <svg viewBox="0 0 24 24" fill="none" stroke="#17B26A" stroke-width="2" width="13" height="13"><path d="M13.832 16.568a1 1 0 0 0 1.213-.303l.355-.465A2 2 0 0 1 17 15h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2A18 18 0 0 1 2 4a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-.8 1.6l-.468.351a1 1 0 0 0-.292 1.233 14 14 0 0 0 6.392 6.384"/></svg>
          Позвонить
        </button>
      </a>

      ${o.trailer ? `
      <a href="${o.trailer.link}" class="crew-card">
        <div class="crew-goto">
          <svg viewBox="0 0 24 24" fill="none" stroke="#98A2B3" stroke-width="2.5" width="12" height="12"><path d="m9 18 6-6-6-6"/></svg>
        </div>
        <div class="crew-lbl">Прицеп</div>
        <div class="crew-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#667085" stroke-width="1.8" width="26" height="26"><rect x="1" y="6" width="16" height="10" rx="2"/><path d="M17 9h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-2"/><circle cx="5" cy="16" r="2"/><circle cx="13" cy="16" r="2"/></svg>
        </div>
        <div class="crew-name">${o.trailer.name}</div>
        <div class="crew-meta">${o.trailer.type}</div>
        <div class="crew-meta">${o.trailer.cap}</div>
        <div class="crew-meta" style="margin-top:4px;font-weight:600;color:#344054">${o.trailer.plate}</div>
      </a>` : `
      <div class="crew-card" style="cursor:default">
        <div class="crew-lbl">Прицеп</div>
        <div class="crew-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#D0D5DD" stroke-width="1.8" width="26" height="26"><rect x="1" y="6" width="16" height="10" rx="2"/><path d="M17 9h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-2"/><circle cx="5" cy="16" r="2"/><circle cx="13" cy="16" r="2"/></svg></div>
        <div style="font-size:12px;color:#D0D5DD;margin-top:4px">Не назначен</div>
      </div>`}
    </div>

    <!-- ROUTE -->
    <div class="card">
      <div class="card-body">
        <div class="route-row">
          <div class="city">
            <div class="city-name">${o.from}</div>
            <div class="city-date">${o.startDate}</div>
          </div>
          <div class="arr-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#FFCB00" stroke-width="3" width="14" height="14"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </div>
          <div class="city" style="text-align:right">
            <div class="city-name">${o.to}</div>
            <div class="city-date">${o.estEnd}</div>
          </div>
        </div>
        ${o.status === 'active' ? `
        <div class="prog-track"><div class="prog-fill" style="width:${o.pct}%"></div></div>
        <div class="prog-lbls"><span>${o.from}</span><span style="font-weight:800;color:#0F0F37">${o.pct}%</span><span>${o.to}</span></div>` : ''}
      </div>
      <div class="chips-row">
        <span class="chip" style="background:#F4F5F7;color:#344054">${o.cargo} · ${o.weight}</span>
        <span class="chip" style="background:#F4F5F7;color:#344054">${o.dist}</span>
        <span class="chip" style="background:#ECFDF3;color:#027A48">${o.income}</span>
      </div>
    </div>

    <!-- MAP (active only) -->
    ${o.status === 'active' ? `
    <div class="card">
      <svg viewBox="0 0 390 150" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">
        <rect width="390" height="150" fill="#e8e3d5"/>
        <path d="M0,0 L390,0 L390,63 Q320,52 255,56 Q185,48 115,56 Q55,50 0,58Z" fill="#ddd8c9"/>
        <path d="M20,58 Q85,70 150,64 Q195,66 235,69 Q215,98 168,110 Q105,116 52,100 Q16,89 20,58Z" fill="#e2dcc8"/>
        <text x="88" y="86" font-size="9" fill="#a09888" font-family="sans-serif" font-weight="600" letter-spacing=".5">УЗБЕКИСТАН</text>
        <line x1="302" y1="74" x2="274" y2="88" stroke="#0F0F37" stroke-width="2.5" stroke-dasharray="5,4" stroke-linecap="round"/>
        <line x1="274" y1="88" x2="230" y2="106" stroke="#0F0F37" stroke-width="2" stroke-dasharray="4,5" opacity=".25" stroke-linecap="round"/>
        <circle cx="302" cy="74" r="5" fill="#475467" stroke="white" stroke-width="1.5"/>
        <text x="278" y="68" font-size="8.5" fill="#344054" font-family="sans-serif" font-weight="700">${o.from}</text>
        <circle cx="230" cy="106" r="5" fill="#FFCB00" stroke="#0F0F37" stroke-width="1.5"/>
        <text x="204" y="122" font-size="8.5" fill="#344054" font-family="sans-serif" font-weight="700">${o.to}</text>
        <circle cx="274" cy="88" r="9" fill="#17B26A" opacity=".2"/>
        <circle cx="274" cy="88" r="5" fill="#17B26A" stroke="white" stroke-width="2"/>
        <rect x="285" y="79" width="54" height="18" rx="7" fill="white" opacity=".92"/>
        <text x="312" y="91" font-size="9.5" fill="#1a8c52" font-family="sans-serif" font-weight="800" text-anchor="middle">${o.mapSpeed}</text>
      </svg>
      <div class="map-stats">
        <div class="ms"><div class="ms-l">Локация</div><div class="ms-v">${o.mapLoc}</div></div>
        <div class="ms"><div class="ms-l">Прогресс</div><div class="ms-v">${o.pct}%</div></div>
        <div class="ms"><div class="ms-l">ETA</div><div class="ms-v">${o.mapEta}</div></div>
      </div>
    </div>` : ''}

    <!-- EXPENSES -->
    <div class="sec-hd">
      <span class="sec-title">Расходы</span>
    </div>

    <!-- Quick add -->
    <div class="quick-scroll">
      ${EXP_CATS.map(c => `
      <button class="q-btn" onclick="addExpense('${c.l}')" style="background:${c.bg}">
        <svg viewBox="0 0 24 24" fill="none" stroke="${c.c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">${c.icon}</svg>
        <span style="color:${c.c}">${c.l}</span>
      </button>`).join('')}
    </div>

    <!-- Expense list -->
    <div class="card">
      <div class="exp-summary-row">
        <span>Итого расходов</span>
        <span class="exp-total">${total > 0 ? '−$' + total.toLocaleString() : '—'}</span>
      </div>
      ${visible.length ? visible.map((e,i) => `
      <div class="exp-item">
        <div class="exp-icon" style="background:${e.bg}">
          <svg viewBox="0 0 24 24" fill="none" stroke="${e.color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">${(EXP_CATS.find(c=>c.l===e.cat)||EXP_CATS[EXP_CATS.length-1]).icon}</svg>
        </div>
        <div class="exp-body">
          <div class="exp-top">
            <span class="exp-cat">${e.cat}</span>
            <span class="exp-amt">−$${e.amount.toLocaleString()}</span>
          </div>
          ${e.note ? `<div class="exp-note">${e.note}</div>` : ''}
          <div class="exp-who">
            <img src="${e.byImg}" class="exp-av" onerror="this.style.display='none'">
            <span class="exp-who-txt">${e.by} · ${e.at}</span>
            <button class="exp-del" onclick="deleteExpense(${i})" title="Удалить">×</button>
          </div>
        </div>
      </div>`).join('') : '<div class="exp-empty">Расходов нет</div>'}
      ${o.expenses.length > PREVIEW ? `
      <button class="see-all-btn" onclick="toggleAllExp()">
        ${showAllExp ? 'Свернуть' : `Посмотреть все (${o.expenses.length})`}
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="${showAllExp ? 'm18 15-6-6-6 6' : 'm6 9 6 6 6-6'}"/></svg>
      </button>` : ''}
    </div>

    <!-- LOG -->
    <div class="sec-hd" style="margin-top:4px">
      <span class="sec-title">Журнал активности</span>
    </div>
    <div class="card" style="margin-bottom:8px">
      ${o.logs.map((l, i) => `
      <div class="log-item">
        <div class="log-dot-col">
          <div class="log-dot" style="background:${l.dot}"></div>
          ${i < o.logs.length - 1 ? '<div class="log-line"></div>' : ''}
        </div>
        <div style="flex:1">
          <div class="log-text">${l.text}${l.badge ? `<span class="log-badge" style="background:${l.badgeRed?'#FEF3F2':'#ECFDF3'};color:${l.badgeRed?'#D92D20':'#027A48'}">${l.badge}</span>` : ''}</div>
          <div class="log-time">${l.time}</div>
        </div>
      </div>`).join('')}
    </div>
  `;
}

render();
</script>
</body>
</html>
