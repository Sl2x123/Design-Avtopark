<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F2F4F7;color:#0F0F37;-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.top-bar{position:sticky;top:0;z-index:50;padding:14px 16px;display:flex;align-items:center;gap:12px;background:rgba(242,244,247,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.back-btn{width:34px;height:34px;border-radius:10px;background:white;border:1px solid #E4E7EC;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;color:#344054}
.top-order-id{font-size:12px;font-weight:700;color:#98A2B3;letter-spacing:.3px}
.status-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;margin-left:auto}

/* ── HERO TRUCK ── */
.truck-hero{position:relative;height:230px;overflow:hidden;margin:0 16px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.truck-hero img{width:100%;height:100%;object-fit:cover;display:block}
.truck-hero-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 30%,rgba(0,0,0,.75) 100%)}
.truck-hero-info{position:absolute;bottom:0;left:0;right:0;padding:16px}
.truck-hero-name{font-size:20px;font-weight:900;color:white;line-height:1.1;letter-spacing:-.3px}
.truck-hero-plate{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:3px 9px;margin-top:6px}
.truck-hero-plate span{font-size:12px;font-weight:700;color:white;letter-spacing:.5px}
.truck-meta-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.truck-meta-chip{background:rgba(255,255,255,.15);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;color:rgba(255,255,255,.9)}

/* ── CREW ROW ── */
.crew-row{display:flex;gap:10px;padding:14px 16px}
.crew-card{flex:1;background:white;border-radius:16px;border:1px solid #EAECF0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.crew-inner{padding:12px}
.crew-label{font-size:9px;font-weight:700;color:#98A2B3;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.crew-img-wrap{position:relative;margin-bottom:8px}
.crew-img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2.5px solid #FFCB00}
.crew-driver-name{font-size:13px;font-weight:700;color:#0F0F37;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crew-meta{font-size:10px;color:#667085;margin-top:2px;display:flex;align-items:center;gap:4px}
.crew-action{display:flex;align-items:center;justify-content:center;gap:4px;background:#ECFDF3;border:none;border-radius:10px;padding:7px 10px;font-size:11px;font-weight:700;color:#17B26A;cursor:pointer;margin-top:8px;width:100%;text-decoration:none}
.trailer-icon-wrap{width:44px;height:44px;border-radius:12px;background:#F4F5F7;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.trailer-name{font-size:13px;font-weight:700;color:#0F0F37;line-height:1.2}
.trailer-meta{font-size:10px;color:#667085;margin-top:3px}

/* ── ROUTE CARD ── */
.route-card{margin:0 16px;background:white;border-radius:18px;border:1px solid #EAECF0;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow:hidden}
.route-top{padding:14px 16px}
.route-cities{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.city-blk{flex:1;min-width:0}
.city-name{font-size:18px;font-weight:900;color:#0F0F37;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.city-date{font-size:11px;color:#98A2B3;margin-top:1px}
.arrow-circle{width:32px;height:32px;border-radius:50%;background:#FFFBEB;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prog-bar-track{height:5px;background:#F2F4F7;border-radius:999px;overflow:hidden}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,#FFCB00,#FFAD00);border-radius:999px}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:#98A2B3;margin-top:4px}
.route-chips{display:flex;gap:6px;flex-wrap:wrap;padding:12px 16px;border-top:1px solid #F4F5F7}
.rchip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px}

/* ── MAP CARD ── */
.map-card{margin:14px 16px 0;background:white;border-radius:18px;overflow:hidden;border:1px solid #EAECF0;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.map-stats-row{display:flex;border-top:1px solid #F0F0F0}
.map-stat{flex:1;padding:11px 14px;border-right:1px solid #F0F0F0}
.map-stat:last-child{border-right:none}
.map-stat-l{font-size:9px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.map-stat-v{font-size:14px;font-weight:800;color:#0F0F37}

/* ── SECTION HEADER ── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 10px}
.sec-hd-title{font-size:13px;font-weight:700;color:#344054}
.sec-hd-action{display:flex;align-items:center;gap:6px;background:#FFCB00;border:none;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;color:#0F0F37;cursor:pointer;font-family:inherit}

/* ── EXPENSE ITEMS ── */
.exp-list{margin:0 16px;background:white;border-radius:18px;border:1px solid #EAECF0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.exp-summary{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid #F4F5F7}
.exp-summary-label{font-size:13px;font-weight:700;color:#0F0F37}
.exp-summary-val{font-size:15px;font-weight:800;color:#F04438}
.exp-item{display:flex;align-items:flex-start;gap:12px;padding:12px 15px;border-bottom:1px solid #F9FAFB}
.exp-item:last-child{border-bottom:none}
.exp-cat-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.exp-item-body{flex:1;min-width:0}
.exp-item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.exp-item-cat{font-size:13px;font-weight:700;color:#0F0F37}
.exp-item-amount{font-size:14px;font-weight:800;color:#F04438;white-space:nowrap}
.exp-item-note{font-size:11px;color:#667085;margin-top:2px}
.exp-item-who{display:flex;align-items:center;gap:5px;margin-top:6px}
.exp-who-av{width:18px;height:18px;border-radius:50%;object-fit:cover;border:1.5px solid #EAECF0}
.exp-who-text{font-size:10px;color:#98A2B3;font-weight:500}
.exp-empty{padding:24px 16px;text-align:center;color:#D0D5DD;font-size:13px}

/* ── EXPENSE ADD SHEET ── */
.sheet-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);backdrop-filter:blur(3px)}
.sheet-overlay.open{display:flex;flex-direction:column;justify-content:flex-end}
.sheet{background:white;border-radius:22px 22px 0 0;padding:20px 16px 40px;max-height:80vh;overflow-y:auto}
.sheet-drag{width:36px;height:4px;border-radius:2px;background:#E4E7EC;margin:0 auto 16px}
.sheet-title{font-size:17px;font-weight:800;color:#0F0F37;margin-bottom:14px}
.exp-cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.exp-cat-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;border-radius:14px;border:none;cursor:pointer;transition:transform .1s;-webkit-tap-highlight-color:transparent;background:transparent}
.exp-cat-btn.sel{outline:2.5px solid #FFCB00;outline-offset:-2px}
.exp-cat-btn:active{transform:scale(.93)}
.exp-cat-icon-sm{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.exp-cat-lbl{font-size:9px;font-weight:700;text-align:center;line-height:1.3}
.sheet-input{width:100%;border:1.5px solid #EAECF0;border-radius:12px;padding:12px 14px;font-size:15px;font-family:inherit;color:#0F0F37;outline:none;margin-bottom:10px}
.sheet-input:focus{border-color:#FFCB00}
.sheet-submit{width:100%;background:#FFCB00;border:none;border-radius:14px;padding:15px;font-size:15px;font-weight:700;color:#0F0F37;cursor:pointer;font-family:inherit}

/* ── ACTIVITY LOG ── */
.log-list{margin:0 16px 32px;background:white;border-radius:18px;border:1px solid #EAECF0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.log-item{display:flex;gap:12px;padding:12px 15px;border-bottom:1px solid #F9FAFB;position:relative}
.log-item:last-child{border-bottom:none}
.log-dot-wrap{display:flex;flex-direction:column;align-items:center;padding-top:3px}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.log-line{width:1px;background:#F0F0F0;flex:1;margin-top:4px;min-height:8px}
.log-body{flex:1;min-width:0}
.log-text{font-size:12px;color:#344054;font-weight:500;line-height:1.4}
.log-text strong{font-weight:700;color:#0F0F37}
.log-time{font-size:10px;color:#98A2B3;margin-top:3px}
.log-amount{display:inline-block;font-size:11px;font-weight:700;background:#FEF3F2;color:#D92D20;padding:1px 7px;border-radius:6px;margin-left:4px}
.log-amount.green{background:#ECFDF3;color:#027A48}
</style>
</head>

  {label:'Страховка', bg:'#F0F9FF', color:'#0284C7', icon:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>'},
  {label:'Kredit',    bg:'#F4F3FF', color:'#6941C6', icon:'<rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>'},
  {label:'Штраф',     bg:'#FEF3F2', color:'#D92D20', icon:'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>'},
  {label:'Мойка',     bg:'#F0F9FF', color:'#0284C7', icon:'<path d="M12 22a8 8 0 0 1-8-8c0-4.314 6-12 8-12s8 7.686 8 12a8 8 0 0 1-8 8z"/>'},
  {label:'Питание',   bg:'#FFFBEB', color:'#D97706', icon:'<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><line x1="7" y1="2" x2="7" y2="11"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h1v7"/>'},
  {label:'Стоянка',   bg:'#F2F4F7', color:'#667085', icon:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9"/>'},
  {label:'Таможня',   bg:'#F0F9FF', color:'#0369A1', icon:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'},
  {label:'Другое',    bg:'#F2F4F7', color:'#667085', icon:'<circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>'},
];

const idx = parseInt(new URLSearchParams(location.search).get('idx') || '0');
const o = ORDERS[Math.min(idx, ORDERS.length - 1)];
const s = STATUS[o.status];

// Header
document.getElementById('hd-id').textContent = o.id;
document.getElementById('hd-status').textContent = s.label;
document.getElementById('hd-status').style.cssText = `background:${s.bg};color:${s.color};display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px`;
document.getElementById('hd-status').innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${s.dot}"></span>${s.label}`;
document.title = o.from + ' → ' + o.to;

// Cat grid for sheet
document.getElementById('cat-grid').innerHTML = EXP_CATS.map((c,i) => `
  <button class="exp-cat-btn" onclick="selectCat(${i},this)" data-cat="${c.label}" data-color="${c.color}" data-bg="${c.bg}" style="background:${c.bg}">
    <div class="exp-cat-icon-sm" style="background:white;box-shadow:0 1px 4px rgba(0,0,0,.1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="${c.color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">${c.icon}</svg>
    </div>
    <span class="exp-cat-lbl" style="color:${c.color}">${c.label}</span>
  </button>`).join('');

let selectedCat = null;

function selectCat(i, btn) {
  document.querySelectorAll('.exp-cat-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  selectedCat = EXP_CATS[i];
}

function openExpSheet() {
  selectedCat = null;
  document.querySelectorAll('.exp-cat-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-note').value = '';
  document.getElementById('exp-sheet').classList.add('open');
}

document.getElementById('exp-sheet').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

function submitExpense() {
  if (!selectedCat) { alert('Выберите категорию'); return; }
  const amt = parseFloat(document.getElementById('exp-amount').value);
  if (!amt || isNaN(amt)) { alert('Введите сумму'); return; }
  const note = document.getElementById('exp-note').value.trim();
  const now = new Date();
  const timeStr = now.getDate() + ' ' + ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][now.getMonth()] + ' · ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  o.expenses.unshift({
    cat: selectedCat.label, amount: amt, note, color: selectedCat.color, bg: selectedCat.bg,
    by: o.driver.name, byImg: o.driver.img, at: timeStr,
  });
  o.logs.unshift({
    type:'expense', text:`<strong>${o.driver.name}</strong> добавил расход ${selectedCat.label}`,
    amount:`−$${amt.toLocaleString()}`, amountType:'red', time: timeStr, dot:'#F79009',
  });
  document.getElementById('exp-sheet').classList.remove('open');
  renderExpenses();
  renderLogs();
}

function deleteExpense(i) {
  const e = o.expenses[i];
  const now = new Date();
  const timeStr = now.getDate() + ' ' + ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][now.getMonth()] + ' · ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  o.logs.unshift({
    type:'expense', text:`<strong>${o.driver.name}</strong> удалил расход ${e.cat}`,
    amount:`+$${e.amount.toLocaleString()}`, amountType:'green', time: timeStr, dot:'#F04438',
  });
  o.expenses.splice(i, 1);
  renderExpenses();
  renderLogs();
}

function renderExpenses() {
  const total = o.expenses.reduce((s,e) => s+e.amount, 0);
  document.getElementById('exp-wrap').innerHTML = `
  <div class="exp-list">
    <div class="exp-summary">
      <span class="exp-summary-label">Расходы (${o.expenses.length})</span>
      <span class="exp-summary-val">${total > 0 ? '−$' + total.toLocaleString() : '—'}</span>
    </div>
    ${o.expenses.length ? o.expenses.map((e,i) => `
    <div class="exp-item">
      <div class="exp-cat-icon" style="background:${e.bg}">
        <svg viewBox="0 0 24 24" fill="none" stroke="${e.color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">${(EXP_CATS.find(c=>c.label===e.cat)||EXP_CATS[EXP_CATS.length-1]).icon}</svg>
      </div>
      <div class="exp-item-body">
        <div class="exp-item-top">
          <span class="exp-item-cat">${e.cat}</span>
          <span class="exp-item-amount">−$${e.amount.toLocaleString()}</span>
        </div>
        ${e.note ? `<div class="exp-item-note">${e.note}</div>` : ''}
        <div class="exp-item-who">
          <img src="${e.byImg}" class="exp-who-av" onerror="this.style.display='none'">
          <span class="exp-who-text">${e.by} · ${e.at}</span>
          <button onclick="deleteExpense(${i})" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#98A2B3;padding:2px 4px;font-size:16px;line-height:1" title="Удалить">×</button>
        </div>
      </div>
    </div>`).join('') : '<div class="exp-empty">Расходов нет</div>'}
  </div>`;
}

function renderLogs() {
  document.getElementById('log-wrap').innerHTML = `
  <div class="log-list">
    ${o.logs.map((l, i) => `
    <div class="log-item">
      <div class="log-dot-wrap">
        <div class="log-dot" style="background:${l.dot}"></div>
        ${i < o.logs.length - 1 ? '<div class="log-line"></div>' : ''}
      </div>
      <div class="log-body">
        <div class="log-text">${l.text}${l.amount ? `<span class="log-amount${l.amountType==='green'?' green':''}">${l.amount}</span>` : ''}</div>
        <div class="log-time">${l.time}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

        <div class="crew-meta">
          <span style="color:#FFCB00;font-weight:700">★</span> ${o.driver.rating}

      </div>
    </div>` : `<div class="crew-card"><div class="crew-inner"><div class="crew-label">Прицеп</div><div style="font-size:12px;color:#D0D5DD;margin-top:12px">Не назначен</div></div></div>`}
  </div>

  <!-- ROUTE STATUS -->
  <div style="padding:0 16px">
    <div class="route-card">
      <div class="route-top">
        <div class="route-cities">
          <div class="city-blk">

            <div class="city-date">${o.startDate}</div>

            <div class="city-name">${o.to}</div>

          </div>
        </div>
        ${o.status === 'active' ? `
        <div>
          <div class="prog-bar-track"><div class="prog-bar-fill" style="width:${o.pct}%"></div></div>

      </div>
      <div class="route-chips">
        <span class="rchip" style="background:#F4F5F7;color:#344054">${o.cargo} · ${o.weight}</span>

        <span class="rchip" style="background:#ECFDF3;color:#027A48">${o.income}</span>

  </div>

  <!-- MAP (active only) -->
  ${o.status === 'active' ? `

      <circle cx="302" cy="76" r="5" fill="#475467" stroke="white" stroke-width="1.5"/>
      <text x="278" y="70" font-size="8.5" fill="#344054" font-family="sans-serif" font-weight="700">${o.from}</text>
      <circle cx="230" cy="108" r="5" fill="#FFCB00" stroke="#0F0F37" stroke-width="1.5"/>
      <text x="204" y="124" font-size="8.5" fill="#344054" font-family="sans-serif" font-weight="700">${o.to}</text>
      <circle cx="274" cy="90" r="9" fill="#17B26A" opacity=".2"/>
      <circle cx="274" cy="90" r="5" fill="#17B26A" stroke="white" stroke-width="2"/>
      <rect x="285" y="81" width="54" height="18" rx="7" fill="white" opacity=".92"/>
      <text x="312" y="93" font-size="9.5" fill="#1a8c52" font-family="sans-serif" font-weight="800" text-anchor="middle">${o.mapSpeed}</text>

    <div class="map-stats-row">

      <div class="map-stat"><div class="map-stat-l">Прогресс</div><div class="map-stat-v">${o.pct}%</div></div>
      <div class="map-stat"><div class="map-stat-l">ETA</div><div class="map-stat-v">${o.mapEta}</div></div>
    </div>
  </div>` : ''}

  <!-- EXPENSES -->
  <div class="sec-hd">
    <span class="sec-hd-title">Расходы</span>
    <button class="sec-hd-action" onclick="openExpSheet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0F0F37" stroke-width="2.5" width="13" height="13"><path d="M12 5v14M5 12h14"/></svg>
      Добавить
    </button>
  </div>
  <div id="exp-wrap" style="padding:0 16px"></div>

  <!-- ACTIVITY LOG -->
  <div class="sec-hd">
    <span class="sec-hd-title">Журнал активности</span>
  </div>
  <div id="log-wrap" style="padding:0 16px"></div>
`;

renderExpenses();
renderLogs();
</script>
</body>
</html>
