<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F2F4F7;color:#0F0F37;-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100vh}

/* TOP BAR */
.top-bar{position:sticky;top:0;z-index:50;padding:14px 16px;display:flex;align-items:center;gap:10px;background:rgba(242,244,247,.9);backdrop-filter:blur(14px)}
.back-btn{width:36px;height:36px;border-radius:11px;background:white;border:1px solid #E4E7EC;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-decoration:none;color:#344054;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.top-id{font-size:13px;font-weight:700;color:#344054;flex:1}
.s-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* BODY SCROLL */
.scroll{overflow-y:auto;padding:14px 16px 40px;display:flex;flex-direction:column;gap:10px}

/* HERO */
.hero{position:relative;height:220px;border-radius:18px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.14);cursor:pointer;display:block;text-decoration:none}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05) 30%,rgba(0,0,0,.7) 100%)}
.hero-goto{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 10px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:white}
.hero-info{position:absolute;bottom:0;left:0;right:0;padding:14px 16px}
.hero-name{font-size:21px;font-weight:900;color:white;letter-spacing:-.3px;line-height:1.1}
.hero-plate{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);border-radius:7px;padding:3px 8px;margin-top:6px}
.hero-plate span{font-size:11px;font-weight:700;color:white;letter-spacing:.5px}
.hero-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.hero-tag{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:600;color:rgba(255,255,255,.9)}

/* CARD BASE */
.card{background:white;border-radius:18px;border:1px solid #EAECF0;box-shadow:0 1px 4px rgba(0,0,0,.05);overflow:hidden}
.card-label{font-size:10px;font-weight:700;color:#98A2B3;text-transform:uppercase;letter-spacing:.6px;padding:14px 16px 0;display:block}
.card-divider{height:1px;background:#F4F5F7;margin:0 16px}

/* CREW */
.crew-item{display:flex;align-items:center;gap:12px;padding:12px 16px;text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent}
.crew-item:active{opacity:.82}
.crew-av{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid #FFCB00;flex-shrink:0}
.crew-icon-box{width:44px;height:44px;border-radius:13px;background:#F4F5F7;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.crew-info{flex:1;min-width:0}
.crew-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.crew-name{font-size:14px;font-weight:700;color:#0F0F37;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crew-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.crew-rating{font-size:12px;font-weight:700;color:#F79009}
.crew-chevron{color:#D0D5DD}
.crew-sub{font-size:11px;color:#667085;margin-top:2px}
.crew-plate{display:inline-block;font-size:10px;font-weight:700;color:#344054;background:#F4F5F7;border-radius:6px;padding:2px 7px;margin-top:4px;letter-spacing:.3px}
.call-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:#ECFDF3;border:none;border-radius:11px;padding:9px;font-size:12px;font-weight:700;color:#17B26A;cursor:pointer;font-family:inherit;width:100%}

/* ROUTE */
.route-tl{padding:14px 16px}
.route-stop{display:flex;align-items:flex-start;gap:12px}
.route-dot-col{display:flex;flex-direction:column;align-items:center;padding-top:3px}
.route-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.route-line{width:2px;flex:1;min-height:24px;background:#EAECF0;margin:4px 0;border-radius:1px}
.route-stop-info{flex:1;padding-bottom:4px}
.route-city{font-size:16px;font-weight:800;color:#0F0F37;letter-spacing:-.2px}
.route-date{font-size:11px;color:#98A2B3;margin-top:1px}
.route-prog-wrap{margin-left:22px;margin-top:8px;margin-bottom:10px}
.route-prog-track{height:5px;background:#F0F1F3;border-radius:999px;overflow:hidden}
.route-prog-fill{height:100%;background:linear-gradient(90deg,#FFCB00,#FFA800);border-radius:999px}
.route-prog-lbl{display:flex;justify-content:space-between;font-size:10px;color:#98A2B3;margin-top:4px}
.stats-row{display:flex;border-top:1px solid #F4F5F7}
.stat-cell{flex:1;padding:10px 14px;border-right:1px solid #F4F5F7}
.stat-cell:last-child{border-right:none}
.stat-lbl{font-size:9px;font-weight:700;color:#B0B7C3;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.stat-val{font-size:13px;font-weight:700;color:#0F0F37}

/* MAP */
.map-stats{display:flex;border-top:1px solid #F0F0F0}
.ms{flex:1;padding:11px 14px;border-right:1px solid #F0F0F0}
.ms:last-child{border-right:none}
.ms-l{font-size:9px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.ms-v{font-size:14px;font-weight:800;color:#0F0F37}

/* SECTION HEADER */
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 6px}
.sec-title{font-size:13px;font-weight:700;color:#344054}
.sec-btn{font-size:12px;font-weight:600;color:#667085;background:none;border:none;cursor:pointer;padding:2px 0;font-family:inherit}
.add-btn{display:flex;align-items:center;gap:5px;background:#FFCB00;border:none;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;color:#0F0F37;cursor:pointer;font-family:inherit}

/* QUICK ADD */
.quick-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px 0 6px}
.quick-scroll::-webkit-scrollbar{display:none}
.q-btn{display:flex;align-items:center;gap:7px;padding:11px 15px;border-radius:14px;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;transition:transform .1s;-webkit-tap-highlight-color:transparent;flex-shrink:0}
.q-btn:active{transform:scale(.94)}
.q-btn span{font-size:13px;font-weight:700}

/* EXPENSES */
.exp-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-bottom:1px solid #F9FAFB}
.exp-item:last-child{border-bottom:none}
.exp-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.exp-body{flex:1;min-width:0}
.exp-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.exp-cat{font-size:13px;font-weight:700;color:#0F0F37}
.exp-amt{font-size:14px;font-weight:800;color:#F04438;white-space:nowrap}
.exp-note{font-size:11px;color:#667085;margin-top:2px}
.exp-who{display:flex;align-items:center;gap:5px;margin-top:6px}
.exp-av{width:18px;height:18px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1.5px solid #EAECF0}
.exp-who-txt{font-size:10px;color:#98A2B3}
.exp-del{margin-left:auto;background:none;border:none;cursor:pointer;color:#D0D5DD;font-size:18px;line-height:1;padding:0 2px}
.exp-del:hover{color:#F04438}
.exp-empty{padding:20px 16px;text-align:center;color:#D0D5DD;font-size:13px}
.exp-summary-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #F4F5F7}
.exp-summary-row span:first-child{font-size:13px;font-weight:700;color:#0F0F37}
.exp-total{font-size:15px;font-weight:800;color:#F04438}
.see-all-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:11px 16px;font-size:12px;font-weight:600;color:#667085;background:none;border:none;border-top:1px solid #F4F5F7;cursor:pointer;width:100%;font-family:inherit}

/* LOG */
.log-item{display:flex;gap:12px;padding:11px 16px;border-bottom:1px solid #F9FAFB;position:relative}
.log-item:last-child{border-bottom:none}
.log-dot-col{display:flex;flex-direction:column;align-items:center;padding-top:2px;gap:0}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.log-line{width:1.5px;background:#F0F0F0;flex:1;margin-top:3px;min-height:8px}
.log-text{font-size:12px;color:#344054;font-weight:500;line-height:1.4}
.log-text strong{font-weight:700;color:#0F0F37}
.log-time{font-size:10px;color:#98A2B3;margin-top:2px}
.log-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:6px;margin-left:4px;vertical-align:middle}

/* FINANCIAL SHEET */
.fin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.fin-overlay.open{opacity:1;pointer-events:all}
.fin-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:white;border-radius:24px 24px 0 0;z-index:201;transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:88vh;display:flex;flex-direction:column}
.fin-overlay.open .fin-sheet{transform:translateX(-50%) translateY(0)}
.fin-sh-head{padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F2F4F7;flex-shrink:0}
.fin-sh-title{font-size:16px;font-weight:800;color:#0F0F37}
.fin-sh-close{width:32px;height:32px;border-radius:10px;background:#F4F5F7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#667085}
.fin-sh-body{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.fin-balance{background:linear-gradient(135deg,#0F0F37,#1e2060);border-radius:18px;padding:18px 20px;color:white}
.fin-bal-lbl{font-size:11px;font-weight:600;opacity:.6;text-transform:uppercase;letter-spacing:.5px}
.fin-bal-val{font-size:32px;font-weight:900;letter-spacing:-.5px;margin:4px 0 2px}
.fin-bal-sub{font-size:12px;opacity:.55}
.fin-row2{display:flex;gap:10px}
.fin-box{flex:1;background:#F9FAFB;border-radius:14px;padding:14px;border:1px solid #F0F0F0}
.fin-box-lbl{font-size:10px;font-weight:700;color:#98A2B3;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.fin-box-val{font-size:18px;font-weight:900;color:#0F0F37}
.fin-box-sub{font-size:10px;color:#98A2B3;margin-top:2px}
.fin-section-lbl{font-size:12px;font-weight:700;color:#98A2B3;text-transform:uppercase;letter-spacing:.5px;padding:0 2px}
.fin-cat-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F9FAFB}
.fin-cat-row:last-child{border-bottom:none}
.fin-cat-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fin-cat-name{flex:1;font-size:13px;font-weight:600;color:#344054}
.fin-cat-count{font-size:10px;color:#98A2B3;margin-top:1px}
.fin-cat-amt{font-size:14px;font-weight:800;color:#F04438}
.fin-bar-wrap{height:6px;background:#F2F4F7;border-radius:999px;overflow:hidden;margin-top:6px}
.fin-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#F04438,#FB6514)}
.fin-income-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #F9FAFB}
.fin-income-row:last-child{border-bottom:none}
.fin-income-lbl{font-size:13px;font-weight:600;color:#344054}
.fin-income-val{font-size:14px;font-weight:800;color:#17B26A}
</style>
</head>

function addExpense(cat) {
  const c = EXP_CATS.find(x => x.l === cat);
  const amt = prompt(`Сумма (${cat}), $:`);
  if (!amt || isNaN(parseFloat(amt))) return;
  const note = prompt('Комментарий:') || '';
  const now = new Date();
  const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][now.getMonth()];
  const t = now.getDate() + ' ' + mo + ' · ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  o.expenses.unshift({cat, amount: parseFloat(amt), note, by: o.driver.name, byImg: o.driver.img, at: t, color: c.c, bg: c.bg});
  o.logs.unshift({text:`<strong>${o.driver.name}</strong> добавил ${cat}`, badge:`−$${parseFloat(amt).toLocaleString()}`, badgeRed:true, time:t, dot:'#F79009'});
  render();
}

function deleteExpense(i) {
  const e = o.expenses[i];
  const now = new Date();
  const mo = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][now.getMonth()];
  const t = now.getDate() + ' ' + mo + ' · ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  o.logs.unshift({text:`<strong>${o.driver.name}</strong> удалил ${e.cat}`, badge:`+$${e.amount.toLocaleString()}`, badgeRed:false, time:t, dot:'#F04438'});
  o.expenses.splice(i, 1);
  render();
}

function openFinSheet() {
  const total = o.expenses.reduce((s,e) => s+e.amount, 0);
  const incomeRaw = o.income.replace(/[^0-9]/g,'');
  const income = incomeRaw ? parseInt(incomeRaw) : 0;
  const net = income - total;

  // Group expenses by category
  const bycat = {};
  o.expenses.forEach(e => {
    if (!bycat[e.cat]) bycat[e.cat] = {amount:0, count:0, color:e.color, bg:e.bg};
    bycat[e.cat].amount += e.amount;
    bycat[e.cat].count++;
  });
  const cats = Object.entries(bycat).sort((a,b) => b[1].amount - a[1].amount);
  const maxCat = cats.length ? cats[0][1].amount : 1;

  document.getElementById('fin-sheet-body').innerHTML = `
    <div class="fin-balance">
      <div class="fin-bal-lbl">Чистая прибыль</div>
      <div class="fin-bal-val">${net >= 0 ? '+' : ''}$${Math.abs(net).toLocaleString()}</div>
      <div class="fin-bal-sub">${o.from} → ${o.to} · ${o.id}</div>
    </div>

    <div class="fin-row2">
      <div class="fin-box">
        <div class="fin-box-lbl">Доходы</div>
        <div class="fin-box-val" style="color:#17B26A">${income > 0 ? '+$'+income.toLocaleString() : o.income}</div>
        <div class="fin-box-sub">Оплата за рейс</div>
      </div>
      <div class="fin-box">
        <div class="fin-box-lbl">Расходы</div>
        <div class="fin-box-val" style="color:#F04438">${total > 0 ? '−$'+total.toLocaleString() : '—'}</div>
        <div class="fin-box-sub">${o.expenses.length} операций</div>
      </div>
    </div>

    ${income > 0 ? `
    <div style="background:#F9FAFB;border-radius:14px;padding:14px;border:1px solid #F0F0F0">
      <div class="fin-box-lbl" style="margin-bottom:10px">Маржа рейса</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1;height:8px;background:#EAECF0;border-radius:999px;overflow:hidden">
          <div style="height:100%;width:${Math.max(0,Math.min(100,Math.round((net/income)*100)))}%;background:${net>=0?'linear-gradient(90deg,#17B26A,#12B76A)':'linear-gradient(90deg,#F04438,#FB6514)'};border-radius:999px"></div>
        </div>
        <span style="font-size:16px;font-weight:900;color:${net>=0?'#17B26A':'#F04438'}">${Math.round((net/income)*100)}%</span>
      </div>
    </div>` : ''}

    ${cats.length ? `
    <div class="fin-section-lbl">По категориям</div>
    <div class="card" style="margin:0">
      ${cats.map(([cat, d]) => {
        const icon = (EXP_CATS.find(c=>c.l===cat)||EXP_CATS[EXP_CATS.length-1]).icon;
        const pct = Math.round((d.amount/maxCat)*100);
        return `<div class="fin-cat-row">
          <div class="fin-cat-icon" style="background:${d.bg}">
            <svg viewBox="0 0 24 24" fill="none" stroke="${d.color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="17" height="17">${icon}</svg>
          </div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span class="fin-cat-name">${cat}</span>
              <span class="fin-cat-amt">−$${d.amount.toLocaleString()}</span>
            </div>
            <div class="fin-bar-wrap"><div class="fin-bar-fill" style="width:${pct}%"></div></div>
            <div class="fin-cat-count">${d.count} операци${d.count===1?'я':d.count<5?'и':'й'} · ${income>0?Math.round((d.amount/income)*100)+'% от дохода':'—'}</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : `<div style="text-align:center;padding:20px;color:#D0D5DD;font-size:13px">Расходов пока нет</div>`}

    ${income > 0 ? `
    <div class="fin-section-lbl">Доходы</div>
    <div class="card" style="margin:0;padding:4px 16px">
      <div class="fin-income-row">
        <span class="fin-income-lbl">Оплата за рейс</span>
        <span class="fin-income-val">+$${income.toLocaleString()}</span>
      </div>
    </div>` : ''}
  `;

  document.getElementById('fin-overlay').classList.add('open');
}

function closeFinSheet() {
  document.getElementById('fin-overlay').classList.remove('open');
}
</script>

<!-- FINANCIAL DETAIL SHEET -->
<div class="fin-overlay" id="fin-overlay" onclick="if(event.target===this)closeFinSheet()">
  <div class="fin-sheet">
    <div class="fin-sh-head">
      <span class="fin-sh-title">Финансовый отчёт</span>
      <button class="fin-sh-close" onclick="closeFinSheet()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="fin-sh-body" id="fin-sheet-body"></div>
  </div>
</div>
</body>
</html>
