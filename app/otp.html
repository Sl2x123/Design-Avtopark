<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify — Avtopakt Fura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=23"></script>
<link rel="stylesheet" href="assets/styles.css?v=23">
<script src="assets/panda.js?v=23"></script>
</head>
<body>
<div class="app">
  <div class="px-5 py-4">
    <a href="login.html" class="w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-50"><i data-icon="arrow-left" class="w-5 h-5"></i></a>
  </div>
  <div class="app-scroll px-6 flex flex-col">
    <div class="flex-1 flex flex-col">
      <div class="w-14 h-14 rounded-2xl bg-primary-50 border border-primary-100 flex items-center justify-center mb-5 text-primary-700">
        <i data-icon="shield-check" class="w-7 h-7"></i>
      </div>
      <h2 class="text-xl font-semibold text-navy-800 mb-1.5">Verification code</h2>
      <p class="text-gray-500 text-sm mb-7">Code sent to <span class="font-semibold text-gray-700" id="phoneEcho">+998 90 *** ** 67</span></p>

      <div class="grid grid-cols-6 gap-2 mb-2">
        <input maxlength="1" inputmode="numeric" class="otp-cell focused">
        <input maxlength="1" inputmode="numeric" class="otp-cell">
        <input maxlength="1" inputmode="numeric" class="otp-cell">
        <input maxlength="1" inputmode="numeric" class="otp-cell">
        <input maxlength="1" inputmode="numeric" class="otp-cell">
        <input maxlength="1" inputmode="numeric" class="otp-cell">
      </div>
      <p id="otpError" class="hidden text-error-600 text-xs mt-1">Enter all 6 digits</p>

      <button id="verifyBtn" disabled class="btn mt-6 h-12 rounded-lg bg-primary-500 text-navy-800 font-bold flex items-center justify-center shadow-sm opacity-40 pointer-events-none">Verify</button>

      <div class="mt-6 text-center text-sm text-gray-500">
        Didn't get the code?
        <span class="text-gray-400 font-medium ml-1" id="timer">Resend in 1:00</span>
      </div>
    </div>
  </div>
</div>
<style>
  .otp-cell{ height:56px; text-align:center; font-size:22px; font-weight:700; color:#0F0F37;
    border:1px solid #D0D5DD; border-radius:10px; outline:none; box-shadow:0 1px 2px rgba(16,24,40,.05); }
  .otp-cell:focus,.otp-cell.focused{ border-color:#FFCB00; box-shadow:0 0 0 4px rgba(255,203,0,.3); }
</style>
<script>
  Panda.render();
  const phone=sessionStorage.getItem('af_phone');
  if(phone){
    const digits=phone.replace(/\D/g,'').slice(-9);
    document.getElementById('phoneEcho').textContent='+998 '+digits.slice(0,2)+' *** ** '+digits.slice(-2);
  }

  const cells=[...document.querySelectorAll('.otp-cell')];
  const verifyBtn=document.getElementById('verifyBtn');
  function updateVerifyState(){
    const full=cells.every(c=>c.value.trim()!=='');
    verifyBtn.disabled=!full;
    verifyBtn.classList.toggle('opacity-40',!full);
    verifyBtn.classList.toggle('pointer-events-none',!full);
    verifyBtn.classList.toggle('hover:bg-primary-400',full);
    if(full) document.getElementById('otpError').classList.add('hidden');
  }
  cells.forEach((c,i)=>{
    c.addEventListener('input',()=>{ c.value=c.value.replace(/\D/g,'').slice(0,1); if(c.value&&cells[i+1]) cells[i+1].focus(); updateVerifyState(); });
    c.addEventListener('keydown',e=>{ if(e.key==='Backspace'&&!c.value&&cells[i-1]) cells[i-1].focus(); });
  });
  verifyBtn.addEventListener('click',()=>{
    if(verifyBtn.disabled){ document.getElementById('otpError').classList.remove('hidden'); return; }
    sessionStorage.setItem('af_otp_verified','1');
    window.location.href='create-company.html';
  });

  let t=60;
  const timerEl=document.getElementById('timer');
  let iv=null;
  function startTimer(){
    t=60;
    timerEl.textContent='Resend in 1:00';
    timerEl.className='text-gray-400 font-medium ml-1';
    clearInterval(iv);
    iv=setInterval(()=>{
      t--; const m=Math.floor(t/60), s=String(t%60).padStart(2,'0');
      timerEl.textContent=`Resend in ${m}:${s}`;
      if(t<=0){
        clearInterval(iv);
        timerEl.textContent='Resend code';
        timerEl.className='text-navy-700 font-semibold ml-1 cursor-pointer';
        timerEl.addEventListener('click',startTimer,{once:true});
      }
    },1000);
  }
  startTimer();
</script>
</body>
</html>
