<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рейсы — Avtopakt Fura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=29"></script>
<link rel="stylesheet" href="assets/styles.css?v=29">
<script src="assets/panda.js?v=29"></script>
</head>
<body>
<div class="app has-nav">
  <!-- Header -->
  <div class="sticky-head px-5 pt-5 pb-3 border-b border-gray-100">
    <div class="flex items-center justify-between mb-3">
      <div>
        <h1 class="text-2xl font-bold text-navy-800 tracking-tight">Рейсы</h1>
        <p class="text-xs text-gray-500">6 заказов</p>
      </div>
      <div class="flex items-center gap-2">
        <a href="notifications.html" class="relative w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-50">
          <i data-icon="bell" class="w-5 h-5"></i>
          <span class="absolute -top-1 -right-1 min-w-[18px] h-[18px] text-[10px] font-bold bg-error-500 text-white rounded-full flex items-center justify-center px-1">3</span>
        </a>
      </div>
    </div>
    <!-- Filter tabs -->
    <div class="flex gap-2 overflow-x-auto hide-scroll" id="order-tabs"></div>
  </div>

  <!-- Orders list -->
  <div class="app-scroll bg-gray-50 px-4 py-3">
    <div id="orders-list" class="space-y-2.5"></div>
    <div class="h-20"></div>
  </div>

  <!-- FAB: Создать рейс -->
  <button onclick="openCreateOrder()" style="position:fixed;bottom:calc(64px + env(safe-area-inset-bottom) + 16px);left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:8px;background:#FFCB00;color:#0F0F37;border:none;border-radius:999px;padding:14px 28px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(255,203,0,.5);z-index:50;white-space:nowrap;transition:transform .1s,box-shadow .15s" onmousedown="this.style.transform='translateX(-50%) scale(.96)'" onmouseup="this.style.transform='translateX(-50%) scale(1)'" ontouchstart="this.style.transform='translateX(-50%) scale(.96)'" ontouchend="this.style.transform='translateX(-50%) scale(1)'">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0F0F37" stroke-width="2.5" width="18" height="18"><path d="M12 5v14M5 12h14"/></svg>
    Создать рейс
  </button>

</div>

<script>
const APP_ORDERS = [
  {
    id:'ORD-001', status:'active', from:'Ташкент', to:'Лондон',
    cargo:'Электроника · 14 т', dist:'6 800 км', pct:72,
    startDate:'20.06.2026', estEnd:'02.07.2026', income:'$8 500', mapLoc:'Польша, A2', mapSpeed:'72 км/ч',
    truck:{name:'Volvo FH16', plate:'01 A 123 BC', img:'assets/img/trucks/truck1.jpg'},
    driver:{name:'Alisher Karimov', phone:'+998 90 123 45 67', img:'assets/img/drivers/d1.jpg'},
    trailer:{name:'Schmitz', plate:'60 H 545 AA', type:'Curtainsider'},
    expenses:[{cat:'Топливо',amount:520,note:'АЗС Лукойл'},{cat:'Питание',amount:45,note:'Обед'}]
  },
  {
    id:'ORD-002', status:'active', from:'Андижан', to:'Прага',
    cargo:'Текстиль · 18 т', dist:'6 300 км', pct:68,
    startDate:'22.06.2026', estEnd:'05.07.2026', income:'$6 800', mapLoc:'Польша, A2', mapSpeed:'68 км/ч',
    truck:{name:'DAF XF 105', plate:'60 A 467 AA', img:'assets/img/trucks/truck4.jpg'},
    driver:{name:'Vali Rakhimov', phone:'+998 90 456 78 90', img:'assets/img/drivers/d3.jpg'},
    trailer:{name:'Kogel', plate:'60 H 545 AA', type:'Refrigerator'},
    expenses:[{cat:'Топливо',amount:380,note:'АЗС Лукойл'}]
  },
  {
    id:'ORD-003', status:'cancelled', from:'Ташкент', to:'Стамбул',
    cargo:'Хлопок · 20 т', dist:'4 800 км', pct:0,
    startDate:'25.06.2026', estEnd:'—', income:'—',
    truck:{name:'MAN TGX', plate:'01 D 789 AC', img:'assets/img/trucks/truck3.jpg'},
    driver:{name:'—', phone:'', img:'assets/img/drivers/d2.jpg'},
    trailer:{name:'Krone', plate:'75 A 112 BC', type:'Flatbed'},
    expenses:[]
  },
  {
    id:'ORD-004', status:'done', from:'Наманган', to:'Бишкек',
    cargo:'Продукты питания · 12 т', dist:'520 км', pct:100,
    startDate:'20.06.2026', estEnd:'21.06.2026', income:'$800',
    truck:{name:'Mercedes Actros', plate:'30 C 201 BA', img:'assets/img/trucks/truck5.jpg'},
    driver:{name:'Sardor Kholmatov', phone:'+998 90 555 44 33', img:'assets/img/drivers/d4.jpg'},
    trailer:null,
    expenses:[]
  },
  {
    id:'ORD-005', status:'done', from:'Ташкент', to:'Прага',
    cargo:'Хлопковая ткань · 18 т', dist:'5 840 км', pct:100,
    startDate:'08.06.2026', estEnd:'24.06.2026', income:'$4 200',
    truck:{name:'Renault T High', plate:'01 E 550 DC', img:'assets/img/trucks/truck6.jpg'},
    driver:{name:'Jasur Ergashev', phone:'+998 90 222 11 00', img:'assets/img/drivers/d5.jpg'},
    trailer:{name:'Schmitz', plate:'90 K 330 AA', type:'Curtainsider'},
    expenses:[{cat:'Топливо',amount:1840,note:'1840л'},{cat:'Зарплата',amount:1280,note:'16 дней'},{cat:'Страховка',amount:480,note:'Таможня'}]
  },
  {
    id:'ORD-006', status:'cancelled', from:'Фергана', to:'Андижан',
    cargo:'Продукты · 15 т', dist:'305 км', pct:22,
    startDate:'05.06.2026', estEnd:'05.06.2026', income:'—',
    truck:{name:'Scania R500', plate:'70 B 456 DA', img:'assets/img/trucks/truck2.jpg'},
    driver:{name:'Bakhtiyor Yuldashev', phone:'+998 90 789 01 23', img:'assets/img/drivers/d2.jpg'},
    trailer:{name:'Kogel', plate:'60 H 457 AA', type:'Refrigerator'},
    expenses:[]
  },
];

const A_STATUS = {
  active:    {label:'В рейсе',  bg:'#ECFDF3', color:'#027A48', dot:'#17B26A'},
  done:      {label:'Завершён', bg:'#F2F4F7', color:'#344054', dot:'#667085'},
  cancelled: {label:'Отменён',  bg:'#FEF3F2', color:'#B42318', dot:'#F04438'},
};

const QUICK_CATS = [
  {label:'Топливо',       bg:'#ECFDF3', color:'#17B26A'},
  {label:'Зарплата',      bg:'#EFF8FF', color:'#1570EF'},
  {label:'Запчасти',      bg:'#FFF8EB', color:'#F79009'},
  {label:'Сервис/Мастер', bg:'#FFF8EB', color:'#F79009'},
  {label:'Страховка',     bg:'#F0F9FF', color:'#0284C7'},
  {label:'Kredit/Lising', bg:'#F4F3FF', color:'#6941C6'},
  {label:'Штраф',         bg:'#FEF3F2', color:'#D92D20'},
  {label:'Мойка',         bg:'#F0F9FF', color:'#0284C7'},
  {label:'Питание',       bg:'#FFFBEB', color:'#D97706'},
  {label:'Стоянка',       bg:'#F2F4F7', color:'#667085'},
  {label:'Другое',        bg:'#F2F4F7', color:'#667085'},
];

let _curFilter = 'all';

const TABS = [
  ['all','Все',6],['active','В рейсе',2],['done','Завершён',2],['cancelled','Отменён',2]
];

document.getElementById('order-tabs').innerHTML = TABS.map(([k,l,c],i)=>
  `<button class="seg-tab ${i===0?'on':''}" onclick="setTab('${k}',this)">${l}<span class="c">${c}</span></button>`
).join('');

function setTab(key, btn) {
  _curFilter = key;
  document.querySelectorAll('#order-tabs .seg-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

function renderList() {
  const items = APP_ORDERS.filter(o => _curFilter==='all' || o.status===_curFilter);
  document.getElementById('orders-list').innerHTML = items.map((o,i) => {
    const s = A_STATUS[o.status];
    const idx = APP_ORDERS.indexOf(o);
    return `
    <a href="order-detail.html?idx=${idx}" style="text-decoration:none;display:block;background:white;border-radius:20px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);border:1px solid #EAECF0">
      <div style="display:flex;align-items:flex-start;gap:14px;padding:16px">
        <img src="${o.truck.img}" style="width:72px;height:72px;border-radius:14px;object-fit:cover;flex-shrink:0">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px">
            <div style="display:flex;align-items:center;gap:5px;font-size:16px;font-weight:800;color:#0F0F37;min-width:0">
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.from}</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="#FFCB00" stroke-width="3" width="15" height="15" style="flex-shrink:0"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.to}</span>
            </div>
            <span style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:${s.bg};color:${s.color};white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:3px">
              <span style="width:5px;height:5px;border-radius:50%;background:${s.dot};flex-shrink:0"></span>${s.label}
            </span>
          </div>
          <p style="font-size:12px;color:#667085;margin-bottom:${o.status==='active'?'8px':'4px'}">${o.cargo} · ${o.dist}</p>
          ${o.status==='active' ? `
          <div style="height:5px;background:#F2F4F7;border-radius:999px;margin-bottom:5px;overflow:hidden">
            <div style="height:100%;width:${o.pct}%;background:#FFCB00;border-radius:999px"></div>
          </div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:12px;color:#98A2B3">${o.driver.name}</span>
            <span style="font-size:12px;font-weight:800;color:#0F0F37">${o.pct}% пройдено</span>
          </div>` : `<p style="font-size:12px;color:#98A2B3">${o.driver.name} · ${o.startDate}</p>`}
        </div>
      </div>
    </a>`;
  }).join('');
}

function openCreateOrder() {
  alert('Создание нового рейса — в разработке');
}

Panda.mountNav('fleet');
Panda.render();
renderList();
</script>
</body>
</html>
