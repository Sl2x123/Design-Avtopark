function haversineKm(lat1,lng1,lat2,lng2){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function onAddressTyped(target){
  const el = document.getElementById(target==='from' ? 'co-from' : 'co-to');
  const q = el.value.trim().toLowerCase();
  const match = q ? CITIES.find(c => c.name.toLowerCase()===q || c.name.toLowerCase().startsWith(q)) : null;
  if (target==='from') _orderFrom = match || null;
  else _orderTo = match || null;
  updateRouteCalc();
}

  document.getElementById('co-truck-name').textContent = _orderTruck.name+' · '+_orderTruck.plate;
  document.getElementById('co-truck-driver').textContent = 'Водитель: '+_orderTruck.driver.name;
  document.getElementById('co-truck-trailer').textContent = _orderTruck.trailer ? ('Прицеп: '+_orderTruck.trailer.name+' · '+_orderTruck.trailer.plate) : 'Без прицепа';
  document.getElementById('co-truck-selected').classList.remove('hidden');
}

function openMapPicker(target){
  _pickerTarget = target;
  _pickerPick = null;
  document.getElementById('co-picker-preview').textContent = 'Нажмите на карту, чтобы выбрать точку';
  const confirmBtn = document.getElementById('co-picker-confirm');
  confirmBtn.disabled = true;
  confirmBtn.classList.add('opacity-40','pointer-events-none');
  document.getElementById('mapPickerOverlay').style.display = 'flex';

  if (!_pickerMap) {
    _pickerMap = L.map('mapPicker', {zoomControl:false, attributionControl:false}).setView([41.3, 64], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(_pickerMap);
    _pickerMap.on('click', e => {
      const {lat,lng} = e.latlng;
      if (_pickerMarker) _pickerMap.removeLayer(_pickerMarker);
      _pickerMarker = L.marker([lat,lng]).addTo(_pickerMap);
      let nearest=null, best=Infinity;
      CITIES.forEach(c=>{ const d=haversineKm(lat,lng,c.lat,c.lng); if(d<best){best=d; nearest=c;} });
      _pickerPick = {name:nearest.name, lat, lng};
      document.getElementById('co-picker-preview').innerHTML = `Ближайший город: <b>${nearest.name}</b> (~${Math.round(best)} км от точки)`;
      const btn = document.getElementById('co-picker-confirm');
      btn.disabled = false;
      btn.classList.remove('opacity-40','pointer-events-none');
    });
  }
  setTimeout(()=>_pickerMap.invalidateSize(), 50);
}

function closeMapPicker(){
  document.getElementById('mapPickerOverlay').style.display = 'none';
}

function confirmMapPick(){
  if (!_pickerPick) return;
  if (_pickerTarget==='from') { _orderFrom = _pickerPick; document.getElementById('co-from').value = _pickerPick.name; }
  else { _orderTo = _pickerPick; document.getElementById('co-to').value = _pickerPick.name; }
  closeMapPicker();
  updateRouteCalc();
}

function updateRouteCalc(){
  const box = document.getElementById('co-route-info');
  if (!_orderFrom || !_orderTo) { box.classList.add('hidden'); return; }
  const km = haversineKm(_orderFrom.lat,_orderFrom.lng,_orderTo.lat,_orderTo.lng);
  const hours = km / 70;
  const days = Math.floor(hours/24);
  const hrsLeft = Math.round(hours%24);
  document.getElementById('co-route-dist').textContent = Math.round(km).toLocaleString('ru-RU')+' км';
  document.getElementById('co-route-time').textContent = days>0 ? `${days} дн. ${hrsLeft} ч.` : `${hrsLeft} ч.`;
  const eta = new Date();
  eta.setHours(eta.getHours() + Math.ceil(hours));
  document.getElementById('co-route-eta').textContent = eta.toLocaleDateString('ru-RU');
  box.classList.remove('hidden');
}

function toast(msg){
  document.querySelectorAll('.app-toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='app-toast';
  t.style.cssText='position:fixed;left:16px;right:16px;bottom:calc(64px + env(safe-area-inset-bottom) + 16px);background:#0F0F37;color:#fff;border-radius:14px;padding:14px 16px;font-size:13px;font-weight:600;text-align:center;z-index:3000;box-shadow:0 8px 24px rgba(0,0,0,.25)';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3200);
}

function submitCreateOrder(){
  if (!_orderFrom || !_orderTo) { toast('Укажите города отправления и назначения (введите город или выберите на карте)'); return; }
  if (!_orderTruck) { toast('Выберите грузовик'); return; }
  const cargoName = document.getElementById('co-cargo').value.trim();
  if (!cargoName) { toast('Укажите, что везём (груз)'); return; }

  const km = haversineKm(_orderFrom.lat,_orderFrom.lng,_orderTo.lat,_orderTo.lng);
  const hours = km / 70;
  const weight = document.getElementById('co-weight').value.trim();
  const incomeVal = parseFloat(document.getElementById('co-income').value) || 0;
  const note = document.getElementById('co-note').value.trim();
  const today = new Date();
  const startDate = today.toLocaleDateString('ru-RU');
  const eta = new Date(); eta.setHours(eta.getHours() + Math.ceil(hours));
  const estEnd = eta.toLocaleDateString('ru-RU');

  APP_ORDERS.unshift({
    id: 'ORD-'+String(APP_ORDERS.length+1).padStart(3,'0'),
    status:'pending', from:_orderFrom.name, to:_orderTo.name,
    cargo: cargoName + (weight ? ' · '+weight+' т' : ''), dist: Math.round(km).toLocaleString('ru-RU')+' км', pct:0,
    startDate, estEnd, income: incomeVal ? '$'+incomeVal.toLocaleString('en-US') : '—',
    note: note || null,
    truck:{name:_orderTruck.name, plate:_orderTruck.plate, img:_orderTruck.img},
    driver:_orderTruck.driver,
    trailer:_orderTruck.trailer,
    expenses:[]
  });

  document.getElementById('createOrderSheet').classList.remove('open');
  renderTabs();
  renderList();
  toast('Рейс создан и отправлен водителю. Ожидаем подтверждения.');
}

function simulateDriverAccept(idx){
  APP_ORDERS[idx].status = 'active';
  renderTabs();
  renderList();
  toast('🔔 Уведомление: водитель начал рейс. Статус обновлён на «В рейсе».');
}

Panda.mountNav('fleet');
Panda.render();
renderTabs();
renderList();

const _orderSheet = document.getElementById('createOrderSheet');
_orderSheet.addEventListener('click', e => { if (e.target===_orderSheet) _orderSheet.classList.remove('open'); });
_orderSheet.querySelectorAll('[data-close-order]').forEach(el => el.addEventListener('click', () => _orderSheet.classList.remove('open')));
</script>
