<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рейсы — Avtopakt Fura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=29"></script>
<link rel="stylesheet" href="assets/styles.css?v=29">
<script src="assets/panda.js?v=29"></script>
</head>
<body>
<div class="app has-nav">
  <!-- Header -->
  <div class="sticky-head px-5 pt-5 pb-3 border-b border-gray-100">
    <div class="flex items-center justify-between mb-3">
      <div>
        <h1 class="text-2xl font-bold text-navy-800 tracking-tight">Рейсы</h1>
        <p class="text-xs text-gray-500">6 заказов</p>
      </div>
      <div class="flex items-center gap-2">
        <a href="notifications.html" class="relative w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-50">
          <i data-icon="bell" class="w-5 h-5"></i>
          <span class="absolute -top-1 -right-1 min-w-[18px] h-[18px] text-[10px] font-bold bg-error-500 text-white rounded-full flex items-center justify-center px-1">3</span>
        </a>
      </div>
    </div>
    <!-- Filter tabs -->
    <div class="flex gap-2 overflow-x-auto hide-scroll" id="order-tabs"></div>
  </div>

  <!-- Orders list -->
  <div class="app-scroll bg-gray-50 px-4 py-3">
    <div id="orders-list" class="space-y-2.5"></div>
  </div>

  <!-- FAB: Создать рейс -->
  <div style="position:fixed;bottom:72px;left:0;right:0;z-index:100;display:flex;justify-content:center;pointer-events:none">
    <button onclick="openCreateOrder()" style="pointer-events:auto;display:flex;align-items:center;gap:10px;background:#FFCB00;color:#0F0F37;border:none;border-radius:18px;padding:15px 32px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(255,203,0,.45);transition:opacity .15s" onmousedown="this.style.opacity='.85'" onmouseup="this.style.opacity='1'">
      <span style="font-size:22px;font-weight:300;line-height:1">+</span>
      <span>Создать рейс</span>
    </button>
  </div>

  <!-- Order detail sheet -->
  <div id="order-sheet" class="sheet-overlay">
    <div class="sheet" style="max-height:92vh">
      <div class="sheet-head">
        <div>
          <h2 id="os-title" class="text-lg font-bold text-navy-800">—</h2>
          <p id="os-sub" class="text-xs text-gray-400 mt-0.5"></p>
        </div>
        <button data-close class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-50"><i data-icon="close" class="w-5 h-5"></i></button>
      </div>
      <div class="sheet-body" id="os-body" style="padding:0"></div>
    </div>
  </div>
</div>

<script>
const APP_ORDERS = [
  {
    id:'ORD-001', status:'active', from:'Ташкент', to:'Москва',
    cargo:'Электроника · 14 т', dist:'3 240 км', pct:67,
    startDate:'20.06.2026', estEnd:'28.06.2026', income:'$4 800', mapLoc:'Самара', mapSpeed:'74 км/ч',
    truck:{name:'Volvo FH16', plate:'01 A 123 BC', img:'assets/img/trucks/truck1.jpg'},
    driver:{name:'Alisher Karimov', phone:'+998 90 123 45 67', img:'assets/img/drivers/d1.jpg'},
    trailer:{name:'Schmitz', plate:'60 H 545 AA', type:'Curtainsider'},
    expenses:[{cat:'Топливо',amount:520,note:'АЗС Лукойл'},{cat:'Питание',amount:45,note:'Обед'}]
  },
  {
    id:'ORD-002', status:'active', from:'Самарканд', to:'Алматы',
    cargo:'Стройматериалы · 18 т', dist:'860 км', pct:42,
    startDate:'22.06.2026', estEnd:'24.06.2026', income:'$1 200', mapLoc:'Шымкент', mapSpeed:'81 км/ч',
    truck:{name:'DAF XF 105', plate:'60 A 467 AA', img:'assets/img/trucks/truck4.jpg'},
    driver:{name:'Vali Rakhimov', phone:'+998 90 456 78 90', img:'assets/img/drivers/d3.jpg'},
    trailer:{name:'Kogel', plate:'60 H 457 AA', type:'Refrigerator'},
    expenses:[{cat:'Топливо',amount:180,note:'АЗС Газпром'}]
  },
  {
    id:'ORD-003', status:'waiting', from:'Ташкент', to:'Стамбул',
    cargo:'Хлопок · 20 т', dist:'4 800 км', pct:0,
    startDate:'25.06.2026', estEnd:'10.07.2026', income:'$6 500',
    truck:{name:'MAN TGX', plate:'01 D 789 AC', img:'assets/img/trucks/truck3.jpg'},
    driver:{name:'Bakhtiyor Yuldashev', phone:'+998 90 789 01 23', img:'assets/img/drivers/d2.jpg'},
    trailer:{name:'Krone', plate:'75 A 112 BC', type:'Flatbed'},
    expenses:[]
  },
  {
    id:'ORD-004', status:'waiting', from:'Наманган', to:'Бишкек',
    cargo:'Продукты питания · 12 т', dist:'520 км', pct:0,
    startDate:'26.06.2026', estEnd:'27.06.2026', income:'$800',
    truck:{name:'Mercedes Actros', plate:'30 C 201 BA', img:'assets/img/trucks/truck5.jpg'},
    driver:{name:'Sardor Kholmatov', phone:'+998 90 555 44 33', img:'assets/img/drivers/d4.jpg'},
    trailer:null,
    expenses:[]
  },
  {
    id:'ORD-005', status:'done', from:'Ташкент', to:'Прага',
    cargo:'Хлопковая ткань · 18 т', dist:'5 840 км', pct:100,
    startDate:'08.06.2026', estEnd:'24.06.2026', income:'$4 200',
    truck:{name:'Renault T High', plate:'01 E 550 DC', img:'assets/img/trucks/truck6.jpg'},
    driver:{name:'Jasur Ergashev', phone:'+998 90 222 11 00', img:'assets/img/drivers/d5.jpg'},
    trailer:{name:'Schmitz', plate:'90 K 330 AA', type:'Curtainsider'},
    expenses:[{cat:'Топливо',amount:1840,note:'1840л'},{cat:'Зарплата',amount:1280,note:'16 дней'},{cat:'Страховка',amount:480,note:'Таможня'}]
  },
  {
    id:'ORD-006', status:'cancelled', from:'Фергана', to:'Андижан',
    cargo:'Продукты · 15 т', dist:'305 км', pct:22,
    startDate:'05.06.2026', estEnd:'05.06.2026', income:'—',
    truck:{name:'Scania R500', plate:'70 B 456 DA', img:'assets/img/trucks/truck2.jpg'},
    driver:{name:'Bakhtiyor Yuldashev', phone:'+998 90 789 01 23', img:'assets/img/drivers/d2.jpg'},
    trailer:{name:'Kogel', plate:'60 H 457 AA', type:'Refrigerator'},
    expenses:[]
  },
];

const A_STATUS = {
  active:    {label:'В рейсе',  bg:'#ECFDF3', color:'#027A48', dot:'#17B26A'},
  waiting:   {label:'Ожидание', bg:'#FFFAEB', color:'#B54708', dot:'#F79009'},
  done:      {label:'Завершён', bg:'#F2F4F7', color:'#344054', dot:'#667085'},
  cancelled: {label:'Отменён',  bg:'#FEF3F2', color:'#B42318', dot:'#F04438'},
};

const QUICK_CATS = [
  {label:'Топливо',       bg:'#ECFDF3', color:'#17B26A'},
  {label:'Зарплата',      bg:'#EFF8FF', color:'#1570EF'},
  {label:'Запчасти',      bg:'#FFF8EB', color:'#F79009'},
  {label:'Сервис/Мастер', bg:'#FFF8EB', color:'#F79009'},
  {label:'Страховка',     bg:'#F0F9FF', color:'#0284C7'},
  {label:'Kredit/Lising', bg:'#F4F3FF', color:'#6941C6'},
  {label:'Штраф',         bg:'#FEF3F2', color:'#D92D20'},
  {label:'Мойка',         bg:'#F0F9FF', color:'#0284C7'},
  {label:'Питание',       bg:'#FFFBEB', color:'#D97706'},
  {label:'Стоянка',       bg:'#F2F4F7', color:'#667085'},
  {label:'Другое',        bg:'#F2F4F7', color:'#667085'},
];

let _curFilter = 'all';

const TABS = [
  ['all','Все',6],['active','В рейсе',2],['waiting','Ожидание',2],['done','Завершён',1],['cancelled','Отменён',1]
];

document.getElementById('order-tabs').innerHTML = TABS.map(([k,l,c],i)=>
  `<button class="seg-tab ${i===0?'on':''}" onclick="setTab('${k}',this)">${l}<span class="c">${c}</span></button>`
).join('');

function setTab(key, btn) {
  _curFilter = key;
  document.querySelectorAll('#order-tabs .seg-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

function renderList() {
  const items = APP_ORDERS.filter(o => _curFilter==='all' || o.status===_curFilter);
  document.getElementById('orders-list').innerHTML = items.map((o,i) => {
    const s = A_STATUS[o.status];
    const idx = APP_ORDERS.indexOf(o);
    return `
    <div onclick="openOrderSheet(${idx})" class="bg-white rounded-2xl overflow-hidden" style="box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #EAECF0;cursor:pointer;active:opacity-.8">
      <div class="flex items-start gap-3 p-3.5">
        <img src="${o.truck.img}" class="w-12 h-12 rounded-xl object-cover flex-shrink-0">
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between gap-2 mb-1">
            <div class="flex items-center gap-1.5 font-bold text-navy-800" style="font-size:15px">
              <span class="truncate">${o.from}</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="#FFCB00" stroke-width="3" width="14" height="14" style="flex-shrink:0"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              <span class="truncate">${o.to}</span>
            </div>
            <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:${s.bg};color:${s.color};white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:3px">
              <span style="width:5px;height:5px;border-radius:50%;background:${s.dot};flex-shrink:0"></span>${s.label}
            </span>
          </div>
          <p style="font-size:11px;color:#667085;margin-bottom:${o.status==='active'?'6px':'0'}">${o.cargo} · ${o.dist}</p>
          ${o.status==='active' ? `
          <div style="height:4px;background:#F2F4F7;border-radius:999px;margin-bottom:4px;overflow:hidden">
            <div style="height:100%;width:${o.pct}%;background:#FFCB00;border-radius:999px"></div>
          </div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:11px;color:#98A2B3">${o.driver.name}</span>
            <span style="font-size:11px;font-weight:800;color:#0F0F37">${o.pct}% пройдено</span>
          </div>` : `<p style="font-size:11px;color:#98A2B3">${o.driver.name} · ${o.startDate}</p>`}
        </div>
      </div>
      ${o.status==='active'?`<div style="height:2px;background:#FFF9E6"><div style="height:100%;width:${o.pct}%;background:#FFCB00"></div></div>`:''}
    </div>`;
  }).join('');
}

function openOrderSheet(idx) {
  const o = APP_ORDERS[idx];
  const s = A_STATUS[o.status];
  document.getElementById('os-title').textContent = o.from + ' → ' + o.to;
  document.getElementById('os-sub').textContent = o.id + ' · ' + s.label;

  const miniMap = o.status === 'active' ? `
  <div style="background:#fff;border-radius:16px;overflow:hidden;margin:0 16px 12px;border:1px solid #EAECF0">
    <svg viewBox="0 0 360 150" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">
      <rect width="360" height="150" fill="#e8e3d5"/>
      <path d="M0,0 L360,0 L360,60 Q300,50 240,55 Q180,47 120,55 Q60,50 0,58Z" fill="#ddd8c9"/>
      <path d="M25,58 Q80,68 140,63 Q180,66 220,68 Q200,96 160,108 Q100,113 50,98 Q18,88 25,58Z" fill="#e2dcc8"/>
      <text x="85" y="85" font-size="8.5" fill="#a09888" font-family="sans-serif" font-weight="600">УЗБЕКИСТАН</text>
      <line x1="278" y1="80" x2="254" y2="92" stroke="#0F0F37" stroke-width="2.5" stroke-dasharray="5,3.5" stroke-linecap="round"/>
      <line x1="254" y1="92" x2="213" y2="106" stroke="#0F0F37" stroke-width="2" stroke-dasharray="4,4" opacity=".3" stroke-linecap="round"/>
      <circle cx="278" cy="80" r="5" fill="#555" stroke="#fff" stroke-width="1.5"/>
      <text x="258" y="74" font-size="8" fill="#444" font-family="sans-serif" font-weight="700">${o.from}</text>
      <circle cx="213" cy="106" r="5" fill="#FAE436" stroke="#0F0F37" stroke-width="1.5"/>
      <text x="186" y="120" font-size="8" fill="#444" font-family="sans-serif" font-weight="700">${o.to}</text>
      <circle cx="254" cy="92" r="7" fill="#2dbd71" opacity=".3"/>
      <circle cx="254" cy="92" r="5" fill="#2dbd71" stroke="#fff" stroke-width="2"/>
      <text x="263" y="89" font-size="9" fill="#1a8c52" font-family="sans-serif" font-weight="800">${o.mapSpeed||'72 км/ч'}</text>
    </svg>
    <div style="display:flex;border-top:1px solid #f0f0f0">
      <div style="flex:1;padding:9px 12px;border-right:1px solid #f0f0f0">
        <div style="font-size:9px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px">Локация</div>
        <div style="font-size:13px;font-weight:800;color:#0F0F37">${o.mapLoc||'—'}</div>
      </div>
      <div style="flex:1;padding:9px 12px;border-right:1px solid #f0f0f0">
        <div style="font-size:9px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px">Проехано</div>
        <div style="font-size:13px;font-weight:800;color:#0F0F37">${o.pct}%</div>
      </div>
      <div style="flex:1;padding:9px 12px">
        <div style="font-size:9px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px">Доход</div>
        <div style="font-size:13px;font-weight:800;color:#0F0F37">${o.income}</div>
      </div>
    </div>
  </div>` : '';

  const chips = `
  <div style="padding:12px 16px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #F2F4F7">
    <span style="font-size:11px;background:#F2F4F7;color:#344054;padding:4px 10px;border-radius:8px;font-weight:600">${o.cargo}</span>
    <span style="font-size:11px;background:#F2F4F7;color:#344054;padding:4px 10px;border-radius:8px;font-weight:600">${o.dist}</span>
    <span style="font-size:11px;background:#ECFDF3;color:#027A48;padding:4px 10px;border-radius:8px;font-weight:700">${o.income}</span>
  </div>`;

  const prog = o.status==='active' ? `
  <div style="padding:12px 16px;border-bottom:1px solid #F2F4F7">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#98A2B3;margin-bottom:6px">
      <span>${o.from}</span><span style="font-weight:800;color:#0F0F37">${o.pct}%</span><span>${o.to}</span>
    </div>
    <div style="height:5px;background:#F2F4F7;border-radius:999px;overflow:hidden">
      <div style="height:100%;width:${o.pct}%;background:#FFCB00;border-radius:999px"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#98A2B3;margin-top:5px">
      <span>Начало: ${o.startDate}</span><span>Ожидаемое прибытие: ${o.estEnd}</span>
    </div>
  </div>` : '';

  const truckBlock = `
  <div style="padding:12px 16px;border-bottom:1px solid #F2F4F7">
    <div style="font-size:10px;font-weight:700;color:#98A2B3;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Грузовик</div>
    <a href="truck-detail.html" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <img src="${o.truck.img}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;color:#0F0F37">${o.truck.name}</div>
        <div style="font-size:12px;color:#667085">${o.truck.plate}</div>
      </div>
      <svg viewBox="0 0 24 24" fill="none" stroke="#FFCB00" stroke-width="2.5" width="18" height="18"><path d="m9 18 6-6-6-6"/></svg>
    </a>
  </div>`;

  const driverBlock = `
  <div style="padding:12px 16px;border-bottom:1px solid #F2F4F7">
    <div style="font-size:10px;font-weight:700;color:#98A2B3;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Водитель</div>
    <div style="display:flex;align-items:center;gap:10px">
      <img src="${o.driver.img}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #FFCB00;flex-shrink:0">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;color:#0F0F37">${o.driver.name}</div>
        <div style="font-size:12px;color:#667085">${o.driver.phone}</div>
      </div>
      <a href="tel:${o.driver.phone}" style="width:36px;height:36px;border-radius:50%;background:#ECFDF3;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg viewBox="0 0 24 24" fill="none" stroke="#17B26A" stroke-width="2" width="16" height="16"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
      </a>
    </div>
  </div>`;

  const trailerBlock = o.trailer ? `
  <div style="padding:12px 16px;border-bottom:1px solid #F2F4F7">
    <div style="font-size:10px;font-weight:700;color:#98A2B3;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Прицеп</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:40px;height:40px;border-radius:10px;background:#F2F4F7;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg viewBox="0 0 24 24" fill="none" stroke="#667085" stroke-width="1.8" width="20" height="20"><rect x="1" y="6" width="16" height="10" rx="2"/><path d="M17 9h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-2"/><circle cx="5" cy="16" r="2"/><circle cx="13" cy="16" r="2"/></svg>
      </div>
      <div>
        <div style="font-size:14px;font-weight:700;color:#0F0F37">${o.trailer.name} · ${o.trailer.plate}</div>
        <div style="font-size:12px;color:#667085">${o.trailer.type}</div>
      </div>
    </div>
  </div>` : '';

  const quickExpBlock = `
  <div style="padding:12px 16px;border-bottom:1px solid #F2F4F7">
    <div style="font-size:12px;font-weight:700;color:#0F0F37;margin-bottom:10px">Быстрое добавление расхода</div>
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px">
      ${QUICK_CATS.map(c=>`
      <button onclick="addExpense(${idx},'${c.label}')" style="display:flex;flex-direction:column;align-items:center;gap:4px;background:${c.bg};border:none;border-radius:12px;padding:10px 8px;cursor:pointer;flex-shrink:0;min-width:56px">
        <span style="font-size:9px;font-weight:700;color:${c.color};text-align:center;line-height:1.3;white-space:nowrap">${c.label}</span>
      </button>`).join('')}
    </div>
  </div>`;

  const expBlock = `
  <div style="padding:12px 16px 80px">
    <div style="font-size:12px;font-weight:700;color:#0F0F37;margin-bottom:8px">Расходы</div>
    ${o.expenses.length ? o.expenses.map(e=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F9FAFB">
      <div>
        <div style="font-size:13px;font-weight:600;color:#0F0F37">${e.cat}</div>
        ${e.note?`<div style="font-size:11px;color:#98A2B3">${e.note}</div>`:''}
      </div>
      <span style="font-size:13px;font-weight:700;color:#F04438">−$${e.amount}</span>
    </div>`).join('') : '<p style="font-size:12px;color:#D0D5DD;margin:0">Расходов пока нет</p>'}
  </div>`;

  document.getElementById('os-body').innerHTML = prog + chips + miniMap + truckBlock + driverBlock + trailerBlock + quickExpBlock + expBlock;
  Panda.render();
  document.getElementById('order-sheet').classList.add('open');
}

function addExpense(idx, cat) {
  const amt = prompt('Сумма ($):');
  if(!amt || isNaN(parseFloat(amt))) return;
  const note = prompt('Комментарий:') || '';
  APP_ORDERS[idx].expenses.push({cat, amount: parseFloat(amt), note});
  openOrderSheet(idx);
}

function openCreateOrder() {
  alert('Создание нового рейса — в разработке');
}

const sheet = document.getElementById('order-sheet');
sheet.querySelector('[data-close]').addEventListener('click', ()=>sheet.classList.remove('open'));
sheet.addEventListener('click', e=>{ if(e.target===sheet) sheet.classList.remove('open'); });

Panda.mountNav('fleet');
Panda.render();
renderList();
</script>
</body>
</html>
