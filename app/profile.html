<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль — Avtopakt Fura</title>
<script>
  if(!localStorage.getItem('af_logged_in')){ location.replace('login.html'); }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=32"></script>
<link rel="stylesheet" href="assets/styles.css?v=32">
<script src="assets/panda.js?v=32"></script>
<style>
.fleet-sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:white;border-radius:24px 24px 0 0;z-index:201;transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom)}
.fleet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.fleet-overlay.open{opacity:1;pointer-events:all}
.fleet-overlay.open .fleet-sheet{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app has-nav">

  <!-- Header -->
  <div class="sticky-head px-5 pt-5 pb-3 border-b border-gray-100">
    <div class="flex items-center justify-between gap-3">
      <h1 class="text-2xl font-bold text-navy-800 tracking-tight shrink-0">Профиль</h1>

      <!-- Fleet switcher chip -->
      <button id="fleetSwitchBtn" onclick="openFleetSheet()" class="flex-1 min-w-0 flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-xl px-3 h-10 hover:bg-gray-100 transition-colors">
        <span id="fs-abbr" class="w-6 h-6 rounded-lg flex items-center justify-center text-[10px] font-bold shrink-0" style="background:#FFCB00;color:#0F0F37">AL</span>
        <span id="fs-name" class="text-[13px] font-semibold text-navy-800 truncate flex-1 text-left">Avtopakt Logistics</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="#98A2B3" stroke-width="2.5" width="14" height="14" class="shrink-0"><path d="m6 9 6 6 6-6"/></svg>
      </button>

      <!-- Bell -->
      <a href="notifications.html" class="relative w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 shrink-0">
        <i data-icon="bell" class="w-5 h-5"></i>
        <span class="absolute -top-1 -right-1 min-w-[18px] h-[18px] text-[10px] font-bold bg-error-500 text-white rounded-full flex items-center justify-center px-1">3</span>
      </a>
    </div>
  </div>

  <div class="app-scroll bg-gray-50 px-4 py-4 space-y-3">

    <!-- Company card -->
    <div class="rounded-2xl bg-white border border-gray-200 shadow-xs overflow-hidden">
      <div class="flex items-center gap-4 p-4">
        <img id="p-logo" src="assets/logo.svg" class="w-16 h-16 rounded-2xl shrink-0 bg-gray-100 object-cover border border-gray-100">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1.5 mb-0.5">
            <h2 class="text-base font-bold text-navy-800 truncate">Avtopakt Logistics</h2>
            <i data-icon="badge-check" class="w-4 h-4 text-primary-600 shrink-0"></i>
          </div>
          <p class="text-xs text-gray-500">Ташкент, Узбекистан · ООО</p>
          <p class="text-[11px] text-gray-400 mt-0.5">ИНН 305 678 912 · с 01.12.2024</p>
        </div>
        <button id="editCompanyBtn" class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500 shrink-0 hover:bg-gray-50">
          <i data-icon="pencil" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <!-- Stats 4 tiles -->
    <div class="grid grid-cols-4 gap-2" id="state"></div>

    <!-- Subscription card -->
    <a href="subscription.html" class="card-press block rounded-2xl overflow-hidden shadow-xs border border-gray-200">
      <div style="background:linear-gradient(135deg,#0F0F37 0%,#1a2460 100%);padding:18px;position:relative;overflow:hidden">
        <div style="position:absolute;top:-30px;right:-20px;width:110px;height:110px;border-radius:50%;background:rgba(255,203,0,.1)"></div>
        <div style="position:absolute;top:10px;right:45px;width:55px;height:55px;border-radius:50%;background:rgba(255,203,0,.07)"></div>
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-1.5">
            <svg viewBox="0 0 24 24" fill="#FFCB00" width="14" height="14"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span style="font-size:11px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em">Подписка</span>
          </div>
          <span style="font-size:11px;font-weight:700;background:rgba(23,178,106,.2);color:#75E0A7;padding:3px 10px;border-radius:99px;display:inline-flex;align-items:center;gap:5px">
            <span style="width:5px;height:5px;border-radius:50%;background:#75E0A7;display:inline-block"></span>Активна
          </span>
        </div>
        <p style="font-size:22px;font-weight:900;color:white;letter-spacing:-.03em;line-height:1">Fleet Pro Plan</p>
        <div style="display:flex;align-items:center;gap:6px;margin-top:8px">
          <span style="font-size:28px;font-weight:900;color:#FFCB00;letter-spacing:-.04em">$79</span>
          <span style="font-size:13px;color:rgba(255,255,255,.4);font-weight:500">/мес</span>
        </div>
        <p style="font-size:11px;color:rgba(255,255,255,.35);margin-top:4px">До 06.01.2027 · автопродление включено</p>
      </div>
      <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#FAFAFA">
        <span style="width:34px;height:34px;border-radius:10px;background:#FFF7CC;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i data-icon="gauge" class="w-4 h-4" style="color:#B45309"></i>
        </span>
        <div class="flex-1 min-w-0">
          <p style="font-size:13px;font-weight:700;color:#0F0F37">48 грузовиков · 32 водителя</p>
          <p style="font-size:11px;color:#98A2B3;margin-top:1px">Полный доступ к платформе</p>
        </div>
        <i data-icon="chevron-right" class="w-4 h-4" style="color:#D0D5DD"></i>
      </div>
    </a>

    <!-- Menu 1 -->
    <div class="rounded-2xl bg-white border border-gray-200 shadow-xs overflow-hidden" id="menu1"></div>

    <!-- Menu 2 -->
    <div class="rounded-2xl bg-white border border-gray-200 shadow-xs overflow-hidden" id="menu2"></div>

    <!-- Logout -->
    <button id="logoutBtn" class="btn w-full h-12 rounded-xl bg-white border border-gray-200 text-error-600 text-sm font-semibold flex items-center justify-center gap-2 shadow-xs">
      <i data-icon="log-out" class="w-4 h-4"></i>Выйти из аккаунта
    </button>

    <div class="pb-2"></div>
  </div>

  <!-- Fleet switcher sheet -->
  <div class="fleet-overlay" id="fleetOverlay" onclick="if(event.target===this)closeFleetSheet()">
    <div class="fleet-sheet">
      <div style="padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F2F4F7">
        <span style="font-size:16px;font-weight:800;color:#0F0F37">Мои автопарки</span>
        <button onclick="closeFleetSheet()" style="width:32px;height:32px;border-radius:10px;background:#F4F5F7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#667085">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="fleetSheetList" style="padding:8px 0 8px"></div>
      <div style="padding:0 16px 16px">
        <button style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:#F4F5F7;border:none;border-radius:14px;padding:13px;font-size:13px;font-weight:700;color:#344054;cursor:pointer;font-family:inherit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>
          Добавить автопарк
        </button>
      </div>
    </div>
  </div>

  <!-- Edit Company sheet -->
  <div id="ecSheet" class="sheet-overlay">
    <div class="sheet">
      <div class="sheet-head">
        <h2 class="text-lg font-bold text-navy-800">Редактировать компанию</h2>
        <button data-close class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-50"><i data-icon="close" class="w-5 h-5"></i></button>
      </div>
      <div class="sheet-body space-y-4">
        <div class="flex items-center gap-4">
          <img id="ec-logo" src="assets/logo.svg" class="w-16 h-16 rounded-xl object-cover bg-gray-100 shrink-0">
          <label class="inline-flex h-9 px-4 rounded-lg border border-gray-300 text-sm font-semibold text-navy-800 bg-white items-center cursor-pointer hover:bg-gray-50">Изменить лого<input id="ec-logoInput" type="file" accept="image/*" class="hidden"></label>
        </div>
        <div><label class="f-label">Название компании</label><input class="f-field" value="Avtopakt Logistics"></div>
        <div class="grid grid-cols-2 gap-3">
          <div><label class="f-label">Правовая форма</label><div class="f-sel"><select class="f-field"><option>ООО (MCHJ)</option><option>АО (JSC)</option><option>ИП</option></select><i data-icon="chevron-down" class="f-chev w-5 h-5"></i></div></div>
          <div><label class="f-label">ИНН</label><input class="f-field" value="305 678 912"></div>
        </div>
        <div><label class="f-label">Адрес</label><input class="f-field" value="г. Ташкент, Сергелийский р-н, ул. Янгихаёт 12А"></div>
        <div><label class="f-label">Телефон</label><input class="f-field" value="+998 90 123 45 67"></div>
      </div>
      <div class="sheet-foot">
        <button data-close class="btn flex-1 h-12 rounded-lg border border-gray-300 text-navy-800 font-bold">Отмена</button>
        <button data-close class="btn flex-1 h-12 rounded-lg font-bold text-navy-800 shadow-sm" style="background:#FFCB00">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<script>
  const fleets=[
    {abbr:'AL',color:'#FFCB00',textColor:'#0F0F37',name:'Avtopakt Logistics',trucks:48,city:'Ташкент',plan:'Fleet Pro',active:true},
    {abbr:'BT',color:'#2E90FA',textColor:'#fff',  name:'Baraka Transport',  trucks:12,city:'Самарканд',plan:'Fleet Basic',active:false},
    {abbr:'SR',color:'#17B26A',textColor:'#fff',  name:'Silk Road Cargo',   trucks:7, city:'Фергана',  plan:'Fleet Pro',active:false},
  ];

  let activeFleet = fleets[0];

  function renderFleetSheet() {
    document.getElementById('fleetSheetList').innerHTML = fleets.map((f,i) => `
      <div onclick="selectFleet(${i})" style="display:flex;align-items:center;gap:12px;padding:12px 18px;cursor:pointer;background:${f.active?'#FAFAFA':'white'};border-bottom:${i<fleets.length-1?'1px solid #F4F5F7':'none'}">
        <span style="width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;background:${f.color};color:${f.textColor}">${f.abbr}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;color:#0F0F37;display:flex;align-items:center;gap:6px">
            ${f.name}
            ${f.active?'<span style="font-size:10px;font-weight:700;background:#ECFDF3;color:#027A48;padding:1px 6px;border-radius:6px">Активный</span>':''}
          </div>
          <div style="font-size:11px;color:#98A2B3;margin-top:2px">${f.trucks} грузовиков · ${f.city} · ${f.plan}</div>
        </div>
        ${f.active
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="#17B26A" stroke-width="2.5" width="18" height="18" style="flex-shrink:0"><path d="M20 6L9 17l-5-5"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="#D0D5DD" stroke-width="2" width="18" height="18" style="flex-shrink:0"><path d="m9 18 6-6-6-6"/></svg>'}
      </div>`).join('');
  }

  function selectFleet(i) {
    fleets.forEach((f,j) => f.active = j === i);
    activeFleet = fleets[i];
    document.getElementById('fs-abbr').textContent = activeFleet.abbr;
    document.getElementById('fs-abbr').style.background = activeFleet.color;
    document.getElementById('fs-abbr').style.color = activeFleet.textColor;
    document.getElementById('fs-name').textContent = activeFleet.name;
    renderFleetSheet();
    setTimeout(closeFleetSheet, 200);
  }

  function openFleetSheet() {
    renderFleetSheet();
    document.getElementById('fleetOverlay').classList.add('open');
  }
  function closeFleetSheet() {
    document.getElementById('fleetOverlay').classList.remove('open');
  }

  // Stats
  const state=[
    ['Грузовики','48','truck','garage-trucks.html'],
    ['Водители','32','users','garage-drivers.html'],
    ['Прицепы','26','container','garage-trailers.html'],
    ['В рейсе','31','navigation',null,true],
  ];
  document.getElementById('state').innerHTML=state.map(([l,v,ic,href,green])=>{
    const inner=`
      <div class="w-7 h-7 rounded-lg ${green?'bg-success-50':'bg-gray-100'} flex items-center justify-center mx-auto mb-1.5 ${green?'text-success-600':'text-gray-500'}"><i data-icon="${ic}" class="w-3.5 h-3.5"></i></div>
      <p class="text-[17px] font-bold ${green?'text-success-600':'text-navy-800'} leading-none">${v}</p>
      <p class="text-[10px] text-gray-400 mt-1 leading-tight">${l}</p>`;
    return href
      ? `<a href="${href}" class="card-press rounded-2xl bg-white border border-gray-200 shadow-xs p-3 text-center">${inner}</a>`
      : `<div class="rounded-2xl bg-white border border-gray-200 shadow-xs p-3 text-center">${inner}</div>`;
  }).join('');

  // Menu items
  const item=(href,ic,label,sub='',extra='')=>`
    <a href="${href}" class="flex items-center gap-3 px-4 py-3.5 hover:bg-gray-50 active:bg-gray-50">
      <div class="w-9 h-9 rounded-xl bg-gray-100 flex items-center justify-center shrink-0 text-gray-600"><i data-icon="${ic}" class="w-4 h-4"></i></div>
      <div class="flex-1 min-w-0">
        <p class="text-[13px] font-semibold text-navy-800">${label}</p>
        ${sub?`<p class="text-[11px] text-gray-400 mt-0.5">${sub}</p>`:''}
      </div>${extra}<i data-icon="chevron-right" class="w-4 h-4 text-gray-300 shrink-0"></i></a>`;
  const sep='<div class="border-t border-gray-100 mx-4"></div>';

  document.getElementById('menu1').innerHTML=[
    item('plans.html','layers','Тарифные планы','Текущий план: Fleet Pro'),
    item('billing.html','receipt','Биллинг и оплата','История платежей'),
    item('team.html','users-round','Участники команды','5 пользователей','<span class="text-xs font-bold bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full mr-2">5</span>')
  ].join(sep);

  document.getElementById('menu2').innerHTML=[
    item('settings.html','settings','Настройки аккаунта'),
    item('security.html','shield','Безопасность','Пароль и 2FA'),
    item('support.html','life-buoy','Поддержка','Помощь и обратная связь')
  ].join(sep);

  Panda.mountNav('profile');
  Panda.render();

  // Edit company
  const ec=document.getElementById('ecSheet');
  function openEdit(){ec.classList.add('open');}
  document.getElementById('editCompanyBtn').addEventListener('click',openEdit);
  ec.addEventListener('click',e=>{if(e.target===ec)ec.classList.remove('open');});
  ec.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',()=>ec.classList.remove('open')));

  document.getElementById('logoutBtn').addEventListener('click',()=>{
    if(!confirm('Выйти из аккаунта?')) return;
    localStorage.removeItem('af_logged_in');
    localStorage.removeItem('af_subscription');
    sessionStorage.clear();
    window.location.href='login.html';
  });
</script>
</body>
</html>
