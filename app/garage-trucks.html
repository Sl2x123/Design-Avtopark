<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garage · Trucks — Avtopakt Fura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="assets/tw.js?v=30"></script>
<link rel="stylesheet" href="assets/styles.css?v=30">
<script src="assets/panda.js?v=30"></script>
</head>
<body>
<div class="app has-nav">
  <div class="sticky-head px-5 pt-5 border-b border-gray-100">
    <div class="relative flex items-center justify-between mb-3">
      <h1 class="text-2xl font-bold text-navy-800 tracking-tight">Garage</h1>
      <button id="searchBtn" class="w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-gray-50"><i data-icon="search" class="w-5 h-5"></i></button>
      <div id="searchExpand" class="absolute inset-y-0 right-0 bg-white flex items-center" style="width:0;overflow:hidden;transition:width .3s cubic-bezier(.4,0,.2,1)">
        <div class="flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-3.5 h-10 w-full shadow-xs">
          <i data-icon="search" class="w-5 h-5 text-gray-400 shrink-0"></i>
          <input id="searchInput" class="flex-1 min-w-0 outline-none text-[15px] text-navy-800 placeholder:text-gray-400" placeholder="Search trucks">
          <button id="searchClose" class="text-gray-400 shrink-0"><i data-icon="x" class="w-4 h-4"></i></button>
        </div>
      </div>
    </div>
    <div class="flex bg-gray-100 rounded-lg p-1 mb-3">
      <a href="garage-trucks.html" class="flex-1 text-center text-sm font-semibold py-2 rounded-md bg-white text-navy-800 shadow-xs">Trucks</a>
      <a href="garage-drivers.html" class="flex-1 text-center text-sm font-semibold py-2 rounded-md text-gray-500">Drivers</a>
      <a href="garage-trailers.html" class="flex-1 text-center text-sm font-semibold py-2 rounded-md text-gray-500">Trailers</a>
    </div>
    <div class="flex gap-2 pb-3 overflow-x-auto hide-scroll" data-tabs>
      <button class="seg-tab on">All 48</button>
      <button class="seg-tab">On trip 28</button>
      <button class="seg-tab">Idle 16</button>
      <button class="seg-tab">Repair 4</button>
    </div>
  </div>

  <div class="app-scroll bg-gray-50 px-4 pt-4 pb-28"><div class="space-y-3" id="list"></div></div>
  <a href="#" id="addBtn" class="fab-add"><i data-icon="plus"></i>Add truck</a>

  <!-- Add Truck modal -->
  <div id="sheet" class="sheet-overlay">
    <div class="sheet">
      <div class="sheet-head">
        <h2 class="text-lg font-bold text-navy-800">Add Truck</h2>
        <button data-close class="w-9 h-9 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500 hover:bg-gray-50"><i data-icon="close" class="w-5 h-5"></i></button>
      </div>
      <div class="sheet-body space-y-4">
        <div>
          <label class="f-label">License plate</label>
          <div class="flex gap-2">
            <div class="f-plate flex-1"><span class="seg">UZ</span><input id="add-truck-plate" placeholder="60 A 467 AA" onkeydown="if(event.key==='Enter')checkTruckPlate()"></div>
            <button onclick="checkTruckPlate()" class="btn h-12 px-4 rounded-lg bg-navy-800 text-white font-bold shrink-0">Check</button>
          </div>
        </div>

        <div id="truck-lookup-result" class="hidden"></div>

        <div id="truck-invite-fields" class="hidden space-y-4">
          <div><label class="f-label">Assign driver (optional)</label><div class="f-sel"><select id="add-truck-driver" class="f-field"><option value="">— Not assigned —</option><option>Alisher Karimov</option><option>Vali Rakhimov</option><option>Sardor Kholmatov</option></select><i data-icon="chevron-down" class="f-chev w-5 h-5"></i></div></div>
        </div>
      </div>
      <div class="sheet-foot">
        <button data-close class="btn flex-1 h-12 rounded-lg border border-gray-300 text-navy-800 font-bold hover:bg-gray-50">Cancel</button>
        <button id="add-truck-submit" onclick="submitAddTruck()" disabled class="btn flex-1 h-12 rounded-lg bg-primary-500 hover:bg-primary-400 text-navy-800 font-bold shadow-sm opacity-40 pointer-events-none">Add Truck</button>
      </div>
    </div>
  </div>
</div>

<script>
  const trucks=[
    {name:'Volvo FH16',plate:'01 A 123 BC',driver:'Alisher Karimov',trailer:'Schmitz · 60 H 545 AA',trailerType:'Curtainsider',statusKey:'trip',route:{from:'Tashkent',to:'London',pct:72},speed:'72 km/h',rev:8500,exp:4200,prof:4300,img:'assets/img/trucks/truck1.jpg',finance:true,href:'truck-detail.html?s=trip'},
    {name:'Scania R500',plate:'70 B 456 DA',driver:'Bakhtiyor Yuldashev',trailer:'Kogel · 60 H 457 AA',trailerType:'Refrigerator',statusKey:'nosignal',location:'London, UK',rev:5100,exp:3300,prof:1800,img:'assets/img/trucks/truck2.jpg',finance:true,href:'truck-detail.html?s=nosignal'},
    {name:'MAN TGX',plate:'01 D 789 AC',driver:null,trailer:'Krone · 75 A 112 BC',trailerType:'Flatbed',statusKey:'repair',days:5,location:'Tashkent, Uzbekistan',rev:0,exp:1200,prof:-1200,img:'assets/img/trucks/truck3.jpg',finance:true,href:'truck-detail.html?s=repair'},
    {name:'DAF XF 105',plate:'60 A 467 AA',driver:'Vali Rakhimov',trailer:'Kogel · 20 D 341 AA',trailerType:'Refrigerator',statusKey:'trip',route:{from:'Andijan',to:'Prague',pct:68},speed:'68 km/h',rev:6800,exp:3500,prof:3300,img:'assets/img/trucks/truck4.jpg',finance:true,href:'truck-detail.html?s=trip'},
    {name:'Mercedes Actros',plate:'30 C 201 BA',driver:'Sardor Kholmatov',trailer:null,trailerType:null,statusKey:'idle',days:2,location:'Tashkent, Uzbekistan',rev:7200,exp:1900,prof:5300,img:'assets/img/trucks/truck5.jpg',finance:true,href:'truck-detail.html?s=idle'},
    {name:'Renault T High',plate:'01 E 550 DC',driver:'Jasur Ergashev',trailer:'Schmitz · 90 K 330 AA',trailerType:'Curtainsider',statusKey:'done',location:'Tashkent, Uzbekistan',rev:4200,exp:2800,prof:1400,img:'assets/img/trucks/truck6.jpg',finance:true,href:'truck-detail.html?s=done'},
  ];
  document.getElementById('list').innerHTML = trucks.map(Panda.truckCard).join('');
  Panda.mountNav('garage');
  Panda.render();

  const sx=document.getElementById('searchExpand');
  document.getElementById('searchBtn').addEventListener('click',()=>{const row=sx.parentElement,t=row.querySelector('h1');sx.style.width=(row.clientWidth-t.offsetWidth-12)+'px';setTimeout(()=>document.getElementById('searchInput').focus(),150);});
  document.getElementById('searchClose').addEventListener('click',()=>{sx.style.width='0';document.getElementById('searchInput').value='';});

  const ov=document.getElementById('sheet');
  document.getElementById('addBtn').addEventListener('click',e=>{e.preventDefault();resetAddTruckForm();ov.classList.add('open');});
  ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open');});
  ov.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',()=>ov.classList.remove('open')));

  // Simulated registry of plates already working for other companies
  const TRUCK_REGISTRY = [
    { plate:'01Z999XX', company:'Sharq Logistics LLC', busy:true },
  ];
  let _truckLookup = null;

  function normalizePlate(p){ return p.toUpperCase().replace(/[^A-Z0-9]/g,''); }

  function resetAddTruckForm(){
    document.getElementById('add-truck-plate').value = '';
    document.getElementById('add-truck-driver').value = '';
    document.getElementById('truck-lookup-result').classList.add('hidden');
    document.getElementById('truck-lookup-result').innerHTML = '';
    document.getElementById('truck-invite-fields').classList.add('hidden');
    const submitBtn = document.getElementById('add-truck-submit');
    submitBtn.disabled = true;
    submitBtn.classList.add('opacity-40','pointer-events-none');
    _truckLookup = null;
  }

  function checkTruckPlate(){
    const plateInput = document.getElementById('add-truck-plate');
    const raw = plateInput.value.trim();
    const resultEl = document.getElementById('truck-lookup-result');
    const inviteEl = document.getElementById('truck-invite-fields');
    const submitBtn = document.getElementById('add-truck-submit');

    if (normalizePlate(raw).length < 6) {
      plateInput.style.borderColor = '#F04438';
      resultEl.classList.add('hidden');
      inviteEl.classList.add('hidden');
      return;
    }
    plateInput.style.borderColor = '';

    const norm = normalizePlate(raw);
    const known = TRUCK_REGISTRY.find(t => normalizePlate(t.plate) === norm);
    _truckLookup = known ? { plate: raw, busy: true, company: known.company } : { plate: raw, busy: false };

    if (_truckLookup.busy) {
      resultEl.innerHTML = `
        <div class="rounded-2xl p-4" style="background:#FEF3F2;border:1.5px solid #FECDCA">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style="background:#FEE4E2"><i data-icon="truck" class="w-5 h-5" style="color:#D92D20"></i></div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-bold text-navy-800">UZ ${_truckLookup.plate}</p>
              <p class="text-xs text-gray-500">Занят другой компанией</p>
            </div>
            <span class="text-xs font-bold px-2.5 py-1 rounded-full" style="background:#FEE4E2;color:#B42318">Занят</span>
          </div>
          <p class="text-xs" style="color:#B42318">Работает в: <strong>${_truckLookup.company}</strong></p>
        </div>`;
      inviteEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-40','pointer-events-none');
    } else {
      resultEl.innerHTML = `
        <div class="rounded-2xl p-4" style="background:#ECFDF3;border:1.5px solid #ABEFC6">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" style="background:#D1FADF"><i data-icon="truck" class="w-5 h-5" style="color:#079455"></i></div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-bold text-navy-800">UZ ${_truckLookup.plate}</p>
              <p class="text-xs text-gray-400">Не занят другой компанией</p>
            </div>
            <span class="text-xs font-bold px-2.5 py-1 rounded-full" style="background:#D1FADF;color:#079455">Свободен</span>
          </div>
        </div>`;
      inviteEl.classList.remove('hidden');
      submitBtn.disabled = false;
      submitBtn.classList.remove('opacity-40','pointer-events-none');
    }
    resultEl.classList.remove('hidden');
    Panda.render();
  }

  function submitAddTruck(){
    if (!_truckLookup || _truckLookup.busy) return;
    ov.classList.remove('open');
    resetAddTruckForm();
  }
</script>
</body>
</html>
