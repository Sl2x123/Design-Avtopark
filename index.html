<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avtopakt Fura — Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F5F5F8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{width:56px;height:56px;background:#FFCB00;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px}
h1{font-size:24px;font-weight:800;color:#0F0F37;margin-bottom:6px;text-align:center}
p{font-size:14px;color:#667085;margin-bottom:40px;text-align:center}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:400px}
.card{display:flex;align-items:center;gap:16px;background:#fff;border-radius:16px;padding:18px 20px;text-decoration:none;border:1.5px solid #EAECF0;transition:box-shadow .15s,transform .1s}
.card:hover{box-shadow:0 8px 24px rgba(15,15,55,.1);transform:translateY(-2px);border-color:#FFCB00}
.card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.card-text h2{font-size:15px;font-weight:700;color:#0F0F37}
.card-text p{font-size:12px;color:#98A2B3;margin-top:2px}
.arrow{margin-left:auto;color:#D0D5DD;font-size:18px}
</style>
</head>
<body>
  <div class="logo">🚛</div>
  <h1>Avtopakt Fura</h1>
  <p>Fleet Management Prototype</p>
  <div class="cards">
    <a class="card" href="/app/fleet.html">
      <div class="card-icon" style="background:#FEF3C7">📱</div>
      <div class="card-text">
        <h2>Owner App</h2>
        <p>Mobile · Fleet management for fleet owners</p>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="card" href="/admin">
      <div class="card-icon" style="background:#EFF8FF">🖥️</div>
      <div class="card-text">
        <h2>Web Admin</h2>
        <p>Desktop · Full fleet dashboard & analytics</p>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="card" href="/garage">
      <div class="card-icon" style="background:#F0FDF4">🚗</div>
      <div class="card-text">
        <h2>Garage App</h2>
        <p>Driver app · Trips, expenses & truck management</p>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
</body>
</html>
